// Merge year-independent tournament metadata with year-specific venue/eventId.
function tournamentFor(id, year) {
  year = year || state?.year || DEFAULT_YEAR;
  const base = TOURNAMENTS.find(t => t.id === id);
  if (!base) return null;
  const y = YEAR_DATA[year]?.[id] || { venue:'TBD', location:'TBD', espnEventId:null };
  return { ...base, ...y, year };
}
function tournamentsForYear(year) {
  return TOURNAMENTS.map(t => tournamentFor(t.id, year));
}

// Per-category pick quota for STARTERS. Total starters per user = sum of these.
const DEFAULT_PICKS_BY_CATEGORY = { top10: 2, international: 1, nomajorwins: 1, firsttimers: 1 };
// Alternates (not counted in team score unless swapped in). Any field player qualifies.
const DEFAULT_ALTERNATES_PER_USER = 2;

const starterPicksPerUser = (pbc) => Object.values(pbc).reduce((a,b)=>a+b, 0);
const totalPicksPerUser = (pbc, alts) => starterPicksPerUser(pbc) + (alts || 0);

const DEFAULT_STATE = () => ({
  seedVersion: SEED_VERSION,
  gameId: null,               // identifier in the multi-game store; null when no game is active
  gameName: '',               // user-facing label for this game
  createdAt: null,
  updatedAt: null,
  year: DEFAULT_YEAR,         // year of the Major being played
  tournamentId: null,         // which Major this game is for
  users: [],                  // [{id, name}]
  picksByCategory: { ...DEFAULT_PICKS_BY_CATEGORY },
  alternatesPerUser: DEFAULT_ALTERNATES_PER_USER,
  draftOrder: [],             // computed sequence of user ids (snake)
  currentPickIndex: 0,
  picks: [],                  // [{userId, category, playerId, round, overall, isAlternate?}]
  field: SEED_FIELD,          // editable roster
  scores: {},                 // playerId -> { total, today, thru, madeCut, rounds:[...], pos }
  lastSync: null,
  eventState: null            // 'pre' | 'in' | 'post' — last-synced ESPN event state; gates winner banner
});

let state = loadState();

// Repair picks whose playerId is no longer in s.field — happens when the field gets
// replaced (seed-version bump, "Pull Field from ESPN", or "Reset to Seed Field") without
// the picks being remapped. Strategies in order:
//   1. Use the game's saved s.field to recover the original name, then match against
//      SEED_FIELD by normalized name.
//   2. Heuristic: strip a known prefix (p_, espn_, espn_<digits>_, paste_) and treat the
//      remainder as a normalized name (full match or unambiguous last-token match).
// Mutates s.picks and rekeys s.scores. Returns the count of picks remapped.
function repairPickIds(s) {
  if (!s || !Array.isArray(s.picks) || !s.picks.length) return 0;
  const seedById   = new Map(SEED_FIELD.map(p => [p.id, p]));
  const seedByName = new Map(SEED_FIELD.map(p => [normalizeName(p.name), p]));
  const oldById    = new Map((s.field || []).map(p => [p.id, p]));

  const remap = {};
  for (const pick of s.picks) {
    const pid = pick.playerId;
    if (!pid || seedById.has(pid)) continue;
    let target = null;
    const old = oldById.get(pid);
    if (old && old.name) target = seedByName.get(normalizeName(old.name)) || null;
    if (!target) {
      const stem = String(pid).replace(/^(p_|espn_\d+_|espn_|paste_)/, '').replace(/_/g, ' ');
      if (stem) {
        target = seedByName.get(normalizeName(stem)) || null;
        if (!target) {
          // Token-containment match: every token in the stem must appear (as a name part
          // prefix) in the SEED player's normalized name, and the match must be unique.
          // Catches "p_xander" → "xander schauffele", "p_schauffele" hit already done above.
          const tokens = normalizeName(stem).split(' ').filter(t => t.length >= 3);
          if (tokens.length) {
            const cands = SEED_FIELD.filter(p => {
              const parts = normalizeName(p.name).split(' ');
              return tokens.every(t => parts.some(part => part === t || part.startsWith(t) || t.startsWith(part)));
            });
            if (cands.length === 1) target = cands[0];
          }
        }
      }
    }
    if (target && target.id !== pid) {
      remap[pid] = target.id;
      pick.playerId = target.id;
    }
  }

  if (Object.keys(remap).length && s.scores) {
    for (const [oldId, newId] of Object.entries(remap)) {
      if (s.scores[oldId] && !s.scores[newId]) {
        s.scores[newId] = s.scores[oldId];
        delete s.scores[oldId];
      }
    }
  }
  return Object.keys(remap).length;
}

// Collapse duplicate state.field entries that share a normalized name but use different IDs
// (happens when a shared payload's field is merged with SEED_FIELD by ID, leaving e.g.
// dg_18417 and p_scheffler both present for Scottie Scheffler). The ESPN sync's byName
// lookup would only write the score to one of those IDs, leaving picks that reference the
// other ID stuck at "—". Prefer the ID that picks actually reference.
function dedupeFieldByName(s) {
  if (!s || !Array.isArray(s.field) || s.field.length < 2) return 0;
  const pickIds = new Set((s.picks || []).map(pk => pk.playerId).filter(Boolean));
  const byName = new Map();
  for (const p of s.field) {
    const k = normalizeName(p.name);
    const existing = byName.get(k);
    if (!existing) { byName.set(k, p); continue; }
    if (pickIds.has(p.id) && !pickIds.has(existing.id)) byName.set(k, p);
  }
  const deduped = Array.from(byName.values());
  if (deduped.length === s.field.length) return 0;
  const removed = s.field.length - deduped.length;
  s.field = deduped;
  return removed;
}

// One-shot pass over every saved game in the multi-game store. Runs at app boot so games
// the user hasn't opened recently still get fixed in place rather than only on load.
function repairAllSavedGames() {
  let games;
  try { games = JSON.parse(localStorage.getItem(GAMES_KEY) || '{}'); }
  catch (_) { return; }
  let touched = 0;
  for (const id of Object.keys(games)) {
    if (!games[id]) continue;
    touched += repairPickIds(games[id]);
    touched += dedupeFieldByName(games[id]);
  }
  if (touched) {
    try { localStorage.setItem(GAMES_KEY, JSON.stringify(games)); } catch (_) {}
  }
}

function loadState() {
  // 1) URL share payload takes precedence on first load.
  // NOTE: can't call persist() here — the global `state` binding is in the TDZ
  // because `let state = loadState()` is still resolving. persist() reads `state`
  // on its RHS and throws ReferenceError, which the try/catch below silently
  // swallows — making the shared game invisibly fall back to localStorage.
  const hash = window.location.hash;
  if (hash && hash.startsWith('#g=')) {
    try {
      const payload = decodePayload(hash.slice(3));
      if (payload) {
        hydrateSharedPayload(payload);
        try { localStorage.setItem(LS_KEY, JSON.stringify(payload)); } catch (_) {}
        history.replaceState(null, '', window.location.pathname + window.location.search);
        return payload;
      }
    } catch (e) { console.warn('Bad share payload', e); }
  }
  // 2) localStorage
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.picksByCategory) parsed.picksByCategory = { ...DEFAULT_PICKS_BY_CATEGORY };
      if (parsed.alternatesPerUser == null) parsed.alternatesPerUser = DEFAULT_ALTERNATES_PER_USER;
      delete parsed.picksPerUser;
      // Remap stale pick IDs while parsed.field still references the prior roster — must
      // happen BEFORE the seedVersion swap discards that information.
      repairPickIds(parsed);
      if (parsed.seedVersion !== SEED_VERSION) {
        parsed.field = SEED_FIELD;
        parsed.seedVersion = SEED_VERSION;
      }
      const merged = { ...DEFAULT_STATE(), ...parsed };
      ensureDraftOrderCovers(merged);
      return merged;
    }
  } catch (e) {}
  return DEFAULT_STATE();
}
function persist(next) {
  state = next ?? state;
  state.updatedAt = new Date().toISOString();
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
  if (state.gameId) {
    try {
      const games = listGames();
      games[state.gameId] = state;
      localStorage.setItem(GAMES_KEY, JSON.stringify(games));
    } catch (_) {}
  }
}

// ---------- GAMES STORE ----------
function listGames() {
  try {
    const raw = localStorage.getItem(GAMES_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function deleteGame(id) {
  const games = listGames();
  if (!games[id]) return;
  delete games[id];
  try { localStorage.setItem(GAMES_KEY, JSON.stringify(games)); } catch (_) {}
  if (state.gameId === id) {
    const keepYear = state.year;
    state = { ...DEFAULT_STATE(), year: keepYear };
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (_) {}
  }
}
function loadGame(id) {
  const games = listGames();
  const g = games[id];
  if (!g) return false;
  state = { ...DEFAULT_STATE(), ...g };
  // Repair stale pick IDs using the game's saved field BEFORE the seedVersion swap.
  const repaired = repairPickIds(state);
  dedupeFieldByName(state);
  if (state.seedVersion !== SEED_VERSION) {
    state.field = SEED_FIELD;
    state.seedVersion = SEED_VERSION;
  }
  ensureDraftOrderCovers(state);
  persist();
  if (repaired) setTimeout(() => toast(`Recovered ${repaired} pick${repaired === 1 ? '' : 's'} from stale roster IDs.`), 50);
  return true;
}
function gamesForTournament(tournamentId, year) {
  return Object.values(listGames())
    .filter(g => g.tournamentId === tournamentId && g.year === year)
    .sort((a,b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
}
function nextGameNumber(tournamentId, year) {
  return gamesForTournament(tournamentId, year).length + 1;
}
// Incoming share payloads only carry players referenced by picks/scores, so merge
// the local SEED_FIELD in as a fallback and pin seedVersion to prevent a later
// migration from wiping the shared overrides.
function hydrateSharedPayload(payload) {
  // Two-stage dedupe: by ID first (so a shared override of a seed player wins), then by
  // normalized name. The name pass prevents a shared field using one ID scheme (e.g. dg_*)
  // from coexisting with SEED_FIELD's p_* entries for the same player — duplicates would
  // break the ESPN sync's byName lookup (only one ID would receive the score, picks
  // referencing the other ID would render as "—"). Prefer whichever ID the picks reference.
  const byId = new Map();
  (SEED_FIELD || []).forEach(p => byId.set(p.id, p));
  (payload.field || []).forEach(p => byId.set(p.id, p));
  const pickIds = new Set((payload.picks || []).map(pk => pk.playerId).filter(Boolean));
  const byName = new Map();
  for (const p of byId.values()) {
    const k = normalizeName(p.name);
    const existing = byName.get(k);
    if (!existing) { byName.set(k, p); continue; }
    // Prefer the entry whose ID is referenced by picks; otherwise keep the one already present.
    if (pickIds.has(p.id) && !pickIds.has(existing.id)) byName.set(k, p);
  }
  payload.field = Array.from(byName.values());
  payload.seedVersion = SEED_VERSION;
  if (!payload.picksByCategory) payload.picksByCategory = { ...DEFAULT_PICKS_BY_CATEGORY };
  if (payload.alternatesPerUser == null) payload.alternatesPerUser = DEFAULT_ALTERNATES_PER_USER;
  if (!payload.gameId) payload.gameId = 'g_shared_' + Math.random().toString(36).slice(2,9);
  if (!payload.createdAt) payload.createdAt = new Date().toISOString();
  if (!payload.gameName && payload.tournamentId) {
    const t = TOURNAMENTS.find(x => x.id === payload.tournamentId);
    payload.gameName = `${t?.shortName || 'Shared'} (shared)`;
  }
  ensureDraftOrderCovers(payload);
  // Mirror into the games store so the shared game appears on the recipient's home page.
  try {
    const raw = localStorage.getItem(GAMES_KEY);
    const games = raw ? JSON.parse(raw) : {};
    games[payload.gameId] = payload;
    localStorage.setItem(GAMES_KEY, JSON.stringify(games));
  } catch (_) {}
  return payload;
}
function resetAll() {
  if (!confirm('Reset this game and clear all picks? This cannot be undone.')) return;
  if (state.gameId) {
    deleteGame(state.gameId);
  } else {
    localStorage.removeItem(LS_KEY);
    state = DEFAULT_STATE();
  }
  history.replaceState(null, '', window.location.pathname);
  render();
  toast('Game reset.');
}

// 3-letter golf/IOC code -> ISO-2 (for regional-indicator flag emoji).
// ENG/SCO/WAL use subdivision tag sequences; NIR falls back to GB.
const CC3_TO_CC2 = {
  USA:'US', CAN:'CA', MEX:'MX', ARG:'AR', COL:'CO', VEN:'VE', CHI:'CL', BRA:'BR', URU:'UY', PAR:'PY',
  IRL:'IE', FRA:'FR', ITA:'IT', ESP:'ES', GER:'DE', NED:'NL', BEL:'BE', AUT:'AT', SUI:'CH', POR:'PT',
  SWE:'SE', NOR:'NO', DEN:'DK', FIN:'FI', POL:'PL', CZE:'CZ', HUN:'HU', TUR:'TR', GRE:'GR', RUS:'RU',
  RSA:'ZA', ZIM:'ZW', MAR:'MA', NGR:'NG', EGY:'EG',
  JPN:'JP', KOR:'KR', CHN:'CN', TPE:'TW', THA:'TH', IND:'IN', PHI:'PH', MAS:'MY', SGP:'SG', HKG:'HK', VIE:'VN', INA:'ID',
  AUS:'AU', NZL:'NZ', FIJ:'FJ', PUR:'PR'
};
// Subdivision flags supported on macOS/iOS/Chrome; Windows may fall back to plain black flag.
const SUBDIV_FLAGS = {
  ENG: '\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}',
  SCO: '\u{1F3F4}\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}',
  WAL: '\u{1F3F4}\u{E0067}\u{E0062}\u{E0077}\u{E006C}\u{E0073}\u{E007F}'
};
function flagOf(cc3) {
  if (!cc3) return '';
  const up = String(cc3).toUpperCase();
  if (SUBDIV_FLAGS[up]) return SUBDIV_FLAGS[up];
  if (up === 'NIR') return '\u{1F3F4}\u{E0067}\u{E0062}\u{E006E}\u{E0069}\u{E0072}\u{E007F}'; // try N. Ireland tag (limited support)
  const cc2 = CC3_TO_CC2[up];
  if (!cc2) return '';
  return String.fromCodePoint(...[...cc2].map(c => 0x1F1E6 + (c.charCodeAt(0) - 65)));
}

// ---------- UTIL ----------
const $ = (sel, root=document) => root.querySelector(sel);
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (v !== null && v !== undefined && v !== false) n.setAttribute(k, v);
  }
  for (const k of kids.flat()) {
    if (k == null || k === false) continue;
    n.appendChild(typeof k === 'string' ? document.createTextNode(k) : k);
  }
  return n;
};
function toast(msg, ms=2200) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), ms);
}
function fmtScore(n) {
  if (n == null || isNaN(n)) return '—';
  if (n === 0) return 'E';
  return n > 0 ? `+${n}` : `${n}`;
}
function scoreClass(n) {
  if (n == null || isNaN(n)) return 'score-even';
  if (n > 0) return 'score-pos';
  if (n < 0) return 'score-neg';
  return 'score-even';
}
function uid(p='id') { return p + '_' + Math.random().toString(36).slice(2,9); }

// Base64 URL-safe encode/decode of compressed JSON
function encodePayload(obj) {
  const json = JSON.stringify(obj);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decodePayload(s) {
  try {
    const b64 = s.replace(/-/g,'+').replace(/_/g,'/') + '==='.slice((s.length+3)%4);
    const json = decodeURIComponent(escape(atob(b64)));
    return JSON.parse(json);
  } catch (e) { return null; }
}

// ---------- DRAFT LOGIC ----------
function buildSnakeOrder(userIds, rounds) {
  // Standard snake: round 1 = A,B,C…  round 2 = C,B,A  etc.
  // For 2 players and 5 rounds this expands to A-B, B-A, A-B, B-A, A-B (each gets 5 picks).
  const order = [];
  for (let r = 0; r < rounds; r++) {
    const roundIds = r % 2 === 0 ? userIds : [...userIds].reverse();
    order.push(...roundIds);
  }
  return order;
}

// Self-heal drafts started before alternates existed: if draftOrder is short of
// what the current picksByCategory + alternatesPerUser requires, append more
// snake rounds so the existing picks stay in place and the remaining alternate
// slots become draftable.
function ensureDraftOrderCovers(s) {
  if (!s || !s.users || !s.users.length) return;
  if (!s.draftOrder || !s.draftOrder.length) return;
  const pbc = s.picksByCategory || DEFAULT_PICKS_BY_CATEGORY;
  const alts = s.alternatesPerUser ?? 0;
  const need = s.users.length * totalPicksPerUser(pbc, alts);
  if (s.draftOrder.length >= need) return;
  const userIds = s.users.map(u => u.id);
  const perRound = userIds.length;
  const completedRounds = Math.floor(s.draftOrder.length / perRound);
  const totalRounds = Math.ceil(need / perRound);
  const extended = s.draftOrder.slice(0, completedRounds * perRound);
  for (let r = completedRounds; r < totalRounds; r++) {
    const roundIds = r % 2 === 0 ? userIds : [...userIds].reverse();
    extended.push(...roundIds);
  }
  s.draftOrder = extended.slice(0, need);
}

function isPlayerInCategory(player, categoryId, tournamentId) {
  switch (categoryId) {
    case 'top10':         return player.owgr >= 1 && player.owgr <= 10;
    case 'international': return player.country !== 'USA' && player.owgr > 10;
    case 'nomajorwins':   return (player.majorsWon || []).length === 0;
    case 'firsttimers':   return (player.firstTimerAt || []).includes(tournamentId);
    case 'alternate':     return true;   // any field player
    default: return false;
  }
}

// Starter picks (count toward team score) vs alternates.
function starterPicks(userId) {
  return state.picks.filter(p => p.userId === userId && !p.isAlternate);
}
function alternatePicks(userId) {
  return state.picks.filter(p => p.userId === userId && p.isAlternate);
}

function pickedPlayerIds() { return new Set(state.picks.map(p => p.playerId)); }

function currentPicker() {
  if (!state.draftOrder.length) return null;
  if (state.currentPickIndex >= state.draftOrder.length) return null;
  return state.users.find(u => u.id === state.draftOrder[state.currentPickIndex]);
}

function userPicks(userId) {
  return state.picks.filter(p => p.userId === userId);
}

function picksInCategory(userId, categoryId) {
  // Only starter picks count against category quotas. Alternates are tracked separately.
  return userPicks(userId).filter(p => p.category === categoryId && !p.isAlternate);
}

function categoryQuota(categoryId) {
  if (categoryId === 'alternate') return state.alternatesPerUser ?? 0;
  return state.picksByCategory?.[categoryId] ?? 1;
}

function categoryQuotaReached(userId, categoryId) {
  if (categoryId === 'alternate') {
    return alternatePicks(userId).length >= categoryQuota('alternate');
  }
  return picksInCategory(userId, categoryId).length >= categoryQuota(categoryId);
}

// True if the user has filled every starter category (ready to draft alternates).
function startersFilled(userId) {
  return CATEGORIES.every(c => picksInCategory(userId, c.id).length >= categoryQuota(c.id));
}

function advancePick() {
  state.currentPickIndex++;
  persist();
}

function makePick(userId, categoryId, playerId) {
  if (pickedPlayerIds().has(playerId)) return 'That player is already taken.';
  if (categoryQuotaReached(userId, categoryId)) {
    if (categoryId === 'alternate') return `You've filled your Alternate slots.`;
    return `You've filled your ${CATEGORIES.find(c=>c.id===categoryId)?.label} slots.`;
  }
  const round = Math.floor(state.currentPickIndex / state.users.length) + 1;
  state.picks.push({
    userId, category:categoryId, playerId,
    round, overall: state.currentPickIndex + 1,
    isAlternate: categoryId === 'alternate'
  });
  advancePick();
  return null;
}

// Swap a starter pick with one of the same user's alternates.
// The alternate inherits the starter's category so it slots into the same label,
// and the starter becomes an alternate (still tracked, just no longer counted).
function swapPicks(userId, starterPickOverall, alternatePickOverall) {
  const s = state.picks.find(p => p.userId === userId && p.overall === starterPickOverall && !p.isAlternate);
  const a = state.picks.find(p => p.userId === userId && p.overall === alternatePickOverall && p.isAlternate);
  if (!s || !a) return;
  const keptCategory = s.category;
  s.category = 'alternate'; s.isAlternate = true;
  a.category = keptCategory; a.isAlternate = false;
  persist(); render();
  toast('Swapped.');
}

function undoLastPick() {
  if (!state.picks.length) return;
  state.picks.pop();
  state.currentPickIndex = Math.max(0, state.currentPickIndex - 1);
  persist();
  render();
}

function draftComplete() {
  if (!state.users.length) return false;
  const need = totalPicksPerUser(state.picksByCategory, state.alternatesPerUser);
  return state.picks.length >= state.users.length * need;
}

// ---------- WINNER DETERMINATION ----------
function winnerPlayerId() {
  // Whoever has the lowest "total" score and madeCut = true and is the recognized champion.
  // We treat: winner = player whose `state.scores[id].pos === '1'` (leader, final).
  // If event incomplete, return null.
  const scoresByPos1 = Object.entries(state.scores).find(([_, s]) => s && (s.pos === '1' || s.pos === 'T1') && s.isWinner);
  if (scoresByPos1) return scoresByPos1[0];
  return null;
}

function computeStandings() {
  // Picks store player IDs. If state.field has been replaced (e.g. by a stale "Pull Field
  // from ESPN" run) some IDs may no longer resolve, leaving names blank. Fall back to
  // SEED_FIELD so the displayed roster survives a corrupted field.
  const attach = (p) => {
    let pl = state.field.find(f => f.id === p.playerId);
    if (!pl) pl = SEED_FIELD.find(f => f.id === p.playerId);
    const s = state.scores[p.playerId] || {};
    return { pick: p, player: pl, score: s };
  };
  return state.users.map(u => {
    const starterSc  = starterPicks(u.id).map(attach);
    const alternateSc = alternatePicks(u.id).map(attach);
    const total = starterSc.reduce((a,ps) => a + (Number(ps.score.total) || 0), 0);
    const cuts  = starterSc.filter(ps => ps.score.madeCut === true).length;
    const ownsWinner = starterSc.some(ps => state.scores[ps.pick.playerId]?.isWinner);
    return { user:u, picks:starterSc, alternates:alternateSc, total, cuts, ownsWinner };
  });
}

function orderedStandings() {
  const rows = computeStandings();
  // Rule 1: owner of the winning player
  rows.sort((a,b) => {
    if (a.ownsWinner !== b.ownsWinner) return a.ownsWinner ? -1 : 1;
    // Rule 2: most cuts made
    if (b.cuts !== a.cuts) return b.cuts - a.cuts;
    // Rule 3: lowest cumulative score among tied cut counts
    return a.total - b.total;
  });
  return rows;
}

// ---------- ESPN SYNC ----------
// ESPN tournament-scoped fetch. `?event={id}` on /sports/golf/leaderboard pins to a specific
// event even weeks after it ends; /sports/golf/pga/scoreboard ignores ?event (returns current
// week) so it's only useful as a "what's happening now" fallback.
// Returns { data, tournamentMatch, scheduled } where `scheduled` is true when the scoped event
// resolved to the right tournament but ESPN hasn't published the field/scores yet (pre-event).
// In that case we deliberately do NOT fall through to the live scoreboard, because that would
// substitute whatever event is being played this week (e.g. Truist) for the one the user wants.
async function fetchEspnForTournament(tournamentId) {
  const t = tournamentFor(tournamentId);
  const urls = [];
  if (t?.espnEventId) urls.push(`https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?event=${t.espnEventId}`);
  urls.push('https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard'); // current-event fallback
  urls.push('https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard');
  const expected = t?.name || '';
  let lastErr, fallbackData;
  for (const url of urls) {
    try {
      const res = await fetch(url, { cache:'no-store' });
      if (!res.ok) { lastErr = new Error(`HTTP ${res.status} from ${url}`); continue; }
      const data = await res.json();
      const event = data?.events?.[0];
      const comps = event?.competitions?.[0]?.competitors || [];
      const evName = (event?.name || '').toLowerCase();
      const evState = (event?.competitions?.[0]?.status?.type?.state || event?.status?.type?.state || '').toLowerCase();
      const scoped = url.includes('?event=');
      // Scoped URL: trust the event identity. If competitors are empty but the event is
      // scheduled (pre-tournament), surface that distinctly instead of falling through.
      if (scoped && event) {
        if (comps.length) return { data, tournamentMatch: true, scheduled: false };
        if (evState === 'pre') return { data, tournamentMatch: true, scheduled: true };
        // event exists, no competitors, not pre — keep trying other URLs
        lastErr = new Error('Scoped event returned no competitors');
        continue;
      }
      if (!comps.length) { lastErr = new Error('Empty competitors'); continue; }
      const want = expected.toLowerCase().replace('the ','').replace(' championship','').trim();
      // Fallbacks: only accept if the name matches (e.g. you're syncing on Masters week).
      if (want && evName.includes(want)) return { data, tournamentMatch: true, scheduled: false };
      fallbackData = fallbackData || { data, tournamentMatch: false, scheduled: false };
    } catch (e) { lastErr = e; }
  }
  if (fallbackData) return fallbackData;
  throw lastErr || new Error('ESPN unreachable');
}

async function syncScores() {
  if (!state.tournamentId) return;
  const t = tournamentFor(state.tournamentId);
  toast(`Fetching ${t?.shortName || 'event'} leaderboard…`);
  try {
    const { data, tournamentMatch, scheduled } = await fetchEspnForTournament(state.tournamentId);
    const evName = data?.events?.[0]?.name || 'event';
    if (scheduled) {
      return toast(`${t?.name} hasn't started yet — no scores to sync.`);
    }
    if (!tournamentMatch) {
      const ok = confirm(`ESPN returned "${evName}", not ${t?.name}. Apply these scores anyway?`);
      if (!ok) return toast('Sync cancelled.');
    }
    applyEspnData(data);
    state.lastSync = new Date().toISOString();
    persist();
    render();
    toast(`Scores synced (${evName}).`);
  } catch (e) {
    console.warn('ESPN sync failed:', e);
    toast('Could not reach ESPN. Check console for details.');
  }
}

function normalizeName(n) {
  return (n||'').toLowerCase()
    .replace(/[\u00C0-\u024F]/g, c => c.normalize('NFD').replace(/[\u0300-\u036f]/g,''))
    .replace(/[^a-z ]/g,'').replace(/\s+/g,' ').trim();
}

function applyEspnData(data) {
  // ESPN returns events[0].competitions[0].competitors[*]. Response shape:
  //   athlete.displayName, athlete.flag.alt (country name)
  //   score: { value, displayValue } OR number
  //   status.position.displayName ('T12', '1'), status.type.name ('STATUS_CUT', 'STATUS_FINISH'...)
  //   status.period (1..4 by round), status.thru/displayThru
  const event = data?.events?.[0];
  if (!event) return;
  const comp = event.competitions?.[0];
  const competitors = comp?.competitors || [];
  const evState = (comp?.status?.type?.state || event?.status?.type?.state || '').toLowerCase();
  const isFinal = evState === 'post' || /final|complete/i.test(comp?.status?.type?.name || '');
  state.eventState = isFinal ? 'post' : (evState || 'in');

  // A single name can map to multiple field entries when a shared payload (using one ID
  // scheme, e.g. dg_*) gets merged with SEED_FIELD (using p_*) in hydrateSharedPayload —
  // the dedupe there is by ID, not name. Write the same score to every matching ID so
  // picks resolve regardless of which scheme they were drafted under.
  const byName = new Map();
  state.field.forEach(p => {
    const k = normalizeName(p.name);
    const arr = byName.get(k);
    if (arr) arr.push(p); else byName.set(k, [p]);
  });

  // winner: position '1' (not tied) when event is post/final
  const winnerIds = new Set();
  if (isFinal) {
    const w = competitors.find(c => {
      const pos = c.status?.position;
      return pos && (pos.displayName === '1' || pos.id === '1') && !pos.isTie;
    }) || competitors.find(c => c.winner === true);
    if (w) {
      (byName.get(normalizeName(w.athlete?.displayName)) || []).forEach(wp => winnerIds.add(wp.id));
    }
  }

  competitors.forEach(c => {
    const ath = c.athlete || {};
    const key = normalizeName(ath.displayName || ath.fullName);
    const players = byName.get(key);
    if (!players || !players.length) return;

    const posTxt = (c.status?.position?.displayName ?? c.status?.position?.id ?? '').toString();

    const stateName = (c.status?.type?.name || '').toUpperCase();
    const compState = (c.status?.type?.state || '').toLowerCase();
    const notStarted = compState === 'pre' || /SCHEDULED/.test(stateName);

    // ESPN's `c.score.displayValue` is unreliable — it reports "E" for live players who are
    // actually -2 / -3 etc. The canonical to-par lives in `statistics[scoreToPar]`. Fall back
    // to `status.detail` ("-2(8)") and finally `c.score` for older response shapes.
    const stat = (c.statistics || []).find(s => s && s.name === 'scoreToPar');
    let toPar = null;
    if (!notStarted) {
      if (stat && stat.value != null) {
        toPar = Number(stat.value);
        if (!Number.isFinite(toPar)) toPar = parseScore(stat.displayValue);
      }
      if (toPar == null) {
        const detail = c.status?.detail || c.status?.todayDetail || '';
        const m = String(detail).match(/^(-?\d+|E|\+\d+)/i);
        if (m) toPar = parseScore(m[1]);
      }
      if (toPar == null) {
        const scoreRaw = typeof c.score === 'object' && c.score !== null ? c.score.displayValue : c.score;
        toPar = parseScore(scoreRaw);
      }
    }

    const madeCut =
      /CUT|WD|DQ|WITHDRAW/.test(stateName) ? false :
      (c.status?.period || 0) >= 3 ? true :
      null;

    // Current-round to-par: prefer the linescore for the active period (its displayValue is
    // round-only). Fall back to the last linescore entry that has a usable value.
    const linescores = c.linescores || [];
    const periodIdx = Math.max(0, (c.status?.period || 1) - 1);
    const activeLs = linescores[periodIdx] || linescores[linescores.length - 1];
    const todayRaw = activeLs && (typeof activeLs === 'object'
      ? (activeLs.displayValue ?? activeLs.value)
      : activeLs);

    const scoreEntry = {
      total: toPar,
      today: parseScore(todayRaw),
      thru:  c.status?.displayThru ?? c.status?.thru ?? c.status?.displayValue ?? '',
      rounds: (c.linescores||[]).map(l => (typeof l === 'object' ? l.value : l)),
      pos: posTxt,
      madeCut,
      isWinner: false
    };
    players.forEach(p => {
      state.scores[p.id] = { ...scoreEntry, isWinner: winnerIds.has(p.id) };
    });
  });
}

function parseScore(v) {
  if (v == null) return null;
  const s = String(v).trim();
  if (!s || s === '-') return null;
  if (/^E$/i.test(s)) return 0;
  const n = parseInt(s.replace(/\+/,''), 10);
  return isNaN(n) ? null : n;
}

// ---------- ROUTING ----------
const routes = ['home','setup','draft','scoreboard'];
function currentRoute() {
  if (!state.tournamentId)       return 'home';
  if (!state.draftOrder.length)  return 'setup';
  if (!draftComplete())          return 'draft';
  return 'scoreboard';
}

// ---------- RENDER ----------
function render() {
  const root = $('#app'); root.innerHTML = '';
  const r = currentRoute();
  const view =
    r === 'home'       ? renderHome() :
    r === 'setup'      ? renderSetup() :
    r === 'draft'      ? renderDraft() :
                         renderScoreboard();
  view.classList.add('fade-in');
  root.appendChild(view);
}

// ---------- HOME ----------
function renderHome() {
  const wrap = el('section');
  const year = state.year || DEFAULT_YEAR;

  // Header + year pills
  wrap.appendChild(el('div',{class:'mb-6 flex flex-wrap items-end justify-between gap-4'},
    el('div',{},
      el('h2',{class:'font-serif text-3xl sm:text-4xl text-masters-800 font-extrabold'}, `${year} Men's Golf Majors`),
      el('p', {class:'text-gray-600 mt-1 text-sm'},"Start a new Pick'em for any Major, or pick up where you left off.")
    ),
    el('div',{class:'flex flex-wrap gap-2'},
      ...AVAILABLE_YEARS.map(y => el('button',{
        class: 'btn ' + (y === year ? 'btn-primary' : 'btn-ghost'),
        onclick: () => { state.year = y; try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (_) {} render(); }
      }, String(y)))
    )
  ));

  // Tournament grid — each card lists saved games with Open / Delete
  const grid = el('div',{class:'grid grid-cols-1 md:grid-cols-2 gap-5'});
  tournamentsForYear(year).forEach(t => {
    const games = gamesForTournament(t.id, year);
    const card = el('div',{class:'card p-5 relative overflow-hidden'},
      el('div',{style:`position:absolute; top:0; bottom:0; left:0; width:6px; background:${t.color}`}),
      el('div',{class:'ml-3'},
        el('div',{class:'flex items-start justify-between gap-3 mb-4'},
          el('div',{},
            el('div',{class:'text-xs uppercase tracking-wider text-gray-500 font-semibold'}, `${t.month} • ${year}`),
            el('h3',{class:'font-serif text-2xl text-masters-800 mt-1'}, t.name),
            el('div',{class:'text-sm text-gray-600 mt-1'}, t.venue)
          ),
          el('button',{
            class:'btn btn-primary whitespace-nowrap',
            onclick:()=>startTournament(t.id)
          }, '+ New Game')
        ),
        games.length
          ? el('div',{class:'space-y-2'}, ...games.map(g => renderGameRow(g, t)))
          : el('div',{class:'text-sm text-gray-500 italic'}, 'No games started')
      )
    );
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
  return wrap;
}

function renderGameRow(g, t) {
  const names = (g.users || []).map(u => u.name).filter(Boolean);
  const label = names.length ? names.join(', ') : (g.gameName || 'New game');
  const pbc = g.picksByCategory || DEFAULT_PICKS_BY_CATEGORY;
  const alts = g.alternatesPerUser ?? 0;
  const need = (g.users?.length || 0) * totalPicksPerUser(pbc, alts);
  const picksMade = g.picks?.length || 0;
  const phase = !g.users?.length || !g.draftOrder?.length
    ? 'Setup'
    : (need && picksMade >= need) ? 'Complete' : 'In Progress';
  const pillStyle = phase === 'Complete'
    ? 'background:#eaf1ec;color:#36503c;border-color:#b9cfc0'
    : phase === 'In Progress'
      ? 'background:#fef3c7;color:#92400e;border-color:#fde68a'
      : '';
  return el('div',{
    class:'flex items-center justify-between gap-3 bg-gray-50 rounded-lg px-3 py-2 hover:bg-gray-100 cursor-pointer transition',
    onclick:()=>{ if (loadGame(g.gameId)) render(); }
  },
    el('div',{class:'truncate text-sm font-medium text-gray-800'}, label),
    el('div',{class:'flex items-center gap-2 shrink-0'},
      el('span',{class:'pill', style: pillStyle}, phase),
      el('button',{
        class:'btn btn-ghost',
        style:'padding:4px 10px',
        title:'Delete game',
        onclick:(e)=>{
          e.stopPropagation();
          if (!confirm(`Delete this ${t.shortName} game? This cannot be undone.`)) return;
          deleteGame(g.gameId);
          render();
          toast('Game deleted.');
        }
      }, '✕')
    )
  );
}

function startTournament(id) {
  const keepYear = state.year || DEFAULT_YEAR;
  const t = tournamentFor(id, keepYear);
  const gameNum = nextGameNumber(id, keepYear);
  state = {
    ...DEFAULT_STATE(),
    year: keepYear,
    tournamentId: id,
    gameId: uid('g'),
    gameName: `${t.shortName} Game ${gameNum}`,
    createdAt: new Date().toISOString()
  };
  persist();
  render();
  // Auto-load DataGolf-sourced field for this major/year if available (no-op on failure).
  loadAutoField({ silent: true });
}

// Fetch the same-origin DataGolf-sourced field JSON for the current tournament and apply it.
// Files are produced by .github/workflows/update-fields.yml + scripts/fetch-fields.py.
async function loadAutoField({ silent = false } = {}) {
  if (!state.tournamentId) return false;
  const year = state.year || DEFAULT_YEAR;
  const url = `data/${year}/${state.tournamentId}.json`;
  try {
    const res = await fetch(url, { cache: 'no-cache' });
    if (!res.ok) { if (!silent) toast(`No auto field for ${year} ${state.tournamentId} yet.`); return false; }
    const doc = await res.json();
    const incoming = Array.isArray(doc.field) ? doc.field : null;
    if (!incoming || !incoming.length) { if (!silent) toast('Auto field file empty.'); return false; }
    state.field = incoming.map(p => ({
      id: p.id,
      name: p.name,
      country: p.country || '',
      owgr: p.owgr ?? 999,
      majorsWon: Array.isArray(p.majorsWon) ? p.majorsWon : [],
      firstTimerAt: Array.isArray(p.firstTimerAt) ? p.firstTimerAt : [],
      amateur: !!p.amateur
    }));
    persist(); render();
    const ft = state.field.filter(p => (p.firstTimerAt||[]).includes(state.tournamentId)).length;
    if (!silent) toast(`Loaded ${state.field.length} players from DataGolf (${ft} first-timers).`);
    return true;
  } catch (e) {
    if (!silent) toast('Auto field load failed. See console.');
    console.warn('loadAutoField failed:', e);
    return false;
  }
}

// ---------- SETUP (roster + users + start draft) ----------
function renderSetup() {
  const t = tournamentFor(state.tournamentId);
  const wrap = el('section');
  wrap.appendChild(el('div',{class:'flex items-baseline justify-between flex-wrap gap-2 mb-5'},
    el('div',{},
      el('div',{class:'text-xs uppercase tracking-wider text-gray-500 font-semibold'}, 'Setup'),
      el('h2',{class:'font-serif text-3xl text-masters-800 font-extrabold'}, t.name),
      el('div',{class:'text-gray-600 text-sm mt-1'}, `${t.venue} • ${t.location}`)
    ),
    el('button',{class:'btn btn-ghost', onclick:()=>{
      const keepYear = state.year;
      state = { ...DEFAULT_STATE(), year: keepYear };
      try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (_) {}
      render();
    }}, '← Choose Different Major')
  ));

  // Users
  const usersCard = el('div',{class:'card p-5 mb-5'},
    el('h3',{class:'font-serif text-xl text-masters-800 mb-1'},'Players'),
    el('p',{class:'text-sm text-gray-600 mb-3'},'Add 2 or more players. Draft order is the order you list them here.'),
    (()=>{
      const list = el('div',{class:'space-y-2'});
      state.users.forEach((u,i) => {
        list.appendChild(el('div',{class:'flex items-center gap-2'},
          el('span',{class:'w-6 text-gray-500 text-sm text-right'}, String(i+1)+'.'),
          el('input',{type:'text',value:u.name, oninput:(e)=>{ u.name = e.target.value; persist(); }}),
          el('button',{class:'btn btn-ghost',onclick:()=>{ state.users.splice(i,1); persist(); render(); }}, 'Remove')
        ));
      });
      return list;
    })(),
    el('div',{class:'mt-3 flex gap-2'},
      el('button',{class:'btn btn-ghost',onclick:()=>{
        state.users.push({ id: uid('u'), name: `Player ${state.users.length+1}` });
        persist(); render();
      }},'+ Add Player')
    )
  );
  wrap.appendChild(usersCard);

  // Picks per user + category overview (editable quotas)
  const starters = starterPicksPerUser(state.picksByCategory);
  const alts = state.alternatesPerUser || 0;
  const totalPicks = starters + alts;
  const optsCard = el('div',{class:'card p-5 mb-5'},
    el('h3',{class:'font-serif text-xl text-masters-800 mb-1'},'Draft Categories'),

// ESPN `athlete.flag.alt` is a country name ("United States", "England", "Northern Ireland").
// Map to 3-letter codes so the International / USA filter works.
const COUNTRY_CODES = {
  'united states':'USA','usa':'USA','u.s.':'USA','us':'USA',
  'england':'ENG','scotland':'SCO','wales':'WAL','northern ireland':'NIR','ireland':'IRL',
  'south africa':'RSA','australia':'AUS','new zealand':'NZL','japan':'JPN','south korea':'KOR',
  'republic of korea':'KOR','korea':'KOR','canada':'CAN','mexico':'MEX','colombia':'COL',
  'argentina':'ARG','chile':'CHI','venezuela':'VEN','germany':'GER','spain':'ESP',
  'france':'FRA','italy':'ITA','sweden':'SWE','norway':'NOR','denmark':'DEN','finland':'FIN',
  'austria':'AUT','belgium':'BEL','netherlands':'NED','poland':'POL','czech republic':'CZE',
  'taiwan':'TPE','chinese taipei':'TPE','china':'CHN','thailand':'THA','india':'IND',
  'philippines':'PHI','malaysia':'MAS','singapore':'SGP','zimbabwe':'ZIM','fiji':'FIJ',
  'puerto rico':'PUR'
};
function countryCode(raw) {
  if (!raw) return 'USA';
  const k = String(raw).toLowerCase().trim();
  if (COUNTRY_CODES[k]) return COUNTRY_CODES[k];
  if (/^[a-z]{3}$/.test(k)) return k.toUpperCase();
  return String(raw).toUpperCase().slice(0,3);
}

async function pullFieldFromEspn() {
  if (!state.tournamentId) return toast('Pick a tournament first.');
  const t = tournamentFor(state.tournamentId);
  toast(`Loading ${t?.shortName} field from ESPN…`);
  try {
    const { data, tournamentMatch, scheduled } = await fetchEspnForTournament(state.tournamentId);
    const evName = data?.events?.[0]?.name || 'event';
    if (scheduled) {
      return toast(`ESPN hasn't published the ${t?.shortName} field yet (event is scheduled). Try again closer to tournament start, or edit the field manually.`);
    }
    if (!tournamentMatch) {
      const ok = confirm(`ESPN returned "${evName}", not ${t?.name}. Import this field anyway?`);
      if (!ok) return toast('Field load cancelled.');
    }
    const comps = data?.events?.[0]?.competitions?.[0]?.competitors || [];
    if (!comps.length) throw new Error('No competitors returned');

    // Preserve curated OWGR / firstTimerAt / majorsWon metadata (keyed by normalized name).
    // The seed field carries OWGR as-of the tournament week; ESPN only gives us tournament
    // finish position, which would wrongly label the Masters champion as "OWGR #1".
    const prevByName = new Map();
    (SEED_FIELD).forEach(p => prevByName.set(normalizeName(p.name), p));
    state.field.forEach(p => { if (!prevByName.has(normalizeName(p.name))) prevByName.set(normalizeName(p.name), p); });

    const newField = comps.map((c,i) => {
      const ath = c.athlete || {};
      const name = ath.displayName || ath.fullName || `Player ${i+1}`;
      const prior = prevByName.get(normalizeName(name));
      const id = prior?.id || 'espn_' + (ath.id || normalizeName(name).replace(/\s+/g,'_'));
      return {
        id,
        name,
        country: prior?.country || countryCode(ath.flag?.alt || ath.birthPlace?.country),
        owgr: prior?.owgr ?? 999,                       // 999 = NR; edit in Field editor before drafting
        majorsWon: prior?.majorsWon || [],
        firstTimerAt: prior?.firstTimerAt || [],
        amateur: !!(c.amateur || prior?.amateur)
      };
    });
    state.field = newField;
    persist(); render();
    const unknown = newField.filter(p => p.owgr === 999 && !p.amateur).length;
    toast(`Loaded ${comps.length} players from ${evName}.${unknown ? ` ${unknown} unranked — edit OWGR in Field editor.` : ''}`);
  } catch (e) {
    console.warn('Pull field failed:', e);
    toast('ESPN field fetch failed. See console.');
  }
}

// Parse a paste of player names — tolerant of leaderboard-style rows (rank, scores, country).
// Returns deduped display names in input order.
function parsePastedFieldText(text) {
  return (text || '').split(/\r?\n/)
    .map(s => s.trim())
    .filter(Boolean)
    .map(line => {
      let s = line.replace(/^(T?\d+\.?|MC|WD|CUT|DQ|-)\s+/i, '');
      if (s.includes('\t')) {
        const parts = s.split('\t').map(p => p.trim()).filter(Boolean);
        const namePart = parts.find(p => /[A-Za-z][A-Za-z .'\-]+\s[A-Za-z]/.test(p) && !/^[+\-]?\d/.test(p));
        if (namePart) s = namePart;
      }
      s = s.replace(/\s*\([^)]*\)\s*$/, '');
      s = s.replace(/\s+[A-Z]{2,3}\b\s*$/, '');
      s = s.replace(/\s+[+\-]?\d.*$/, '');
      s = s.replace(/\s+/g, ' ').trim();
      // "Last, First" → "First Last" (DataGolf spreadsheet style)
      const m = s.match(/^([A-Za-z][A-Za-z .'\-]+),\s*([A-Za-z][A-Za-z .'\-]+)$/);
      if (m) s = `${m[2]} ${m[1]}`;
      return s;
    })
    .filter(name => /[A-Za-z]/.test(name) && name.length >= 3)
    .filter(name => !/^(Player|Name|Rank|Pos|Position|Score|Total|Today|Thru|Round|Field)$/i.test(name))
    .filter((name, i, arr) => arr.findIndex(n => normalizeName(n) === normalizeName(name)) === i);
}

function applyPastedField(text) {
  const names = parsePastedFieldText(text);
  if (!names.length) return toast('No player names detected in pasted text.');

  const prevByName = new Map();
  SEED_FIELD.forEach(p => prevByName.set(normalizeName(p.name), p));
  state.field.forEach(p => { if (!prevByName.has(normalizeName(p.name))) prevByName.set(normalizeName(p.name), p); });

  const newField = names.map(name => {
    const prior = prevByName.get(normalizeName(name));
    return {
      id: prior?.id || 'paste_' + normalizeName(name).replace(/\s+/g, '_'),
      name: prior?.name || name,
      country: prior?.country || 'USA',
      owgr: prior?.owgr ?? 999,
      majorsWon: prior?.majorsWon || [],
      firstTimerAt: prior?.firstTimerAt || [],
      amateur: prior?.amateur || false
    };
  });

  state.field = newField;
  persist(); render();
  const unknown = newField.filter(p => p.owgr === 999 && !p.amateur).length;
  toast(`Loaded ${newField.length} players from paste.${unknown ? ` ${unknown} unranked — edit OWGR in Field editor.` : ''}`);
}

// ---------- DRAFT ----------
function renderDraft() {
  const t = tournamentFor(state.tournamentId);
  const picker = currentPicker();
  const round = Math.floor(state.currentPickIndex / state.users.length) + 1;
  const picksTaken = pickedPlayerIds();
  const totalRounds = totalPicksPerUser(state.picksByCategory, state.alternatesPerUser);
  const pickingAlternate = picker ? startersFilled(picker.id) : false;

  const wrap = el('section');
  wrap.appendChild(el('div',{class:'flex items-baseline justify-between flex-wrap gap-2 mb-5'},
    el('div',{},
      el('div',{class:'text-xs uppercase tracking-wider text-gray-500 font-semibold'}, 'Snake Draft'),
      el('h2',{class:'font-serif text-3xl text-masters-800 font-extrabold'}, t.name),
      el('div',{class:'text-gray-600 text-sm mt-1'},
        `Pick ${state.currentPickIndex+1} of ${state.draftOrder.length} • Round ${round} of ${totalRounds}${pickingAlternate ? ' • Alternate round' : ''}`)
    ),
    el('div',{class:'flex items-center gap-2'},
      el('button',{class:'btn btn-ghost', onclick:undoLastPick, disabled: state.picks.length===0}, 'Undo Last'),
      el('button',{class:'btn btn-ghost', onclick:()=>{ state.users=[]; state.draftOrder=[]; state.picks=[]; state.currentPickIndex=0; persist(); render(); }}, 'Back to Setup')
    )
  ));

  // On the clock card — pills show starter categories + alternates
  const pickerSlotPills = () => {
    if (!picker) return [];
    const pills = CATEGORIES.map(c => {
      const quota = categoryQuota(c.id);
      if (quota === 0) return null;
      const used = picksInCategory(picker.id, c.id).length;
      const full = used >= quota;
      return el('span',{class:'pill ' + (full ? 'pill-red' : 'pill-green')}, `${c.label} ${used}/${quota}`);
    }).filter(Boolean);
    const altQuota = categoryQuota('alternate');
    if (altQuota > 0) {
      const altUsed = alternatePicks(picker.id).length;
      const full = altUsed >= altQuota;
      pills.push(el('span',{class:'pill ' + (full ? 'pill-red' : 'pill-green')}, `Alternates ${altUsed}/${altQuota}`));
    }
    return pills;
  };

  const onClock = el('div',{class:'card p-5 mb-5 border-masters-600 border-2'},
    el('div',{class:'flex items-center justify-between flex-wrap gap-3'},
      el('div',{},
        el('div',{class:'text-xs uppercase tracking-wider text-masters-700 font-bold'}, 'On the Clock'),
        el('div',{class:'font-serif text-3xl text-masters-800 mt-1'}, picker ? picker.name : '—'),
        el('div',{class:'text-sm text-gray-600 mt-1'}, `Round ${round} • Pick #${state.currentPickIndex+1}${pickingAlternate ? ' • Alternate' : ''}`)
      ),
      el('div',{class:'text-right'},
        el('div',{class:'text-xs uppercase tracking-wider text-gray-500 font-semibold'}, 'Slots for '+ (picker?.name||'')),
        el('div',{class:'mt-1 flex flex-wrap gap-1 justify-end'}, ...pickerSlotPills())
      )
    )
  );
  wrap.appendChild(onClock);

  // Dropdowns: category pickers while any starter slot is open, then a single alternate picker.
  if (picker) {
    const playerLabel = (p) => {
      const rank = (p.owgr && p.owgr < 500) ? `#${p.owgr}` : 'NR';
      const am = p.amateur ? ' (Am)' : '';
      const flag = flagOf(p.country);
      return `${rank} ${p.name}${am} ${flag ? flag + ' ' : ''}(${p.country})`;
    };

    if (!pickingAlternate) {
      const grid = el('div',{class:'grid grid-cols-1 sm:grid-cols-2 gap-4'});
      CATEGORIES.forEach(c => {
        const quota = categoryQuota(c.id);
        if (quota === 0) return;
        const usedCount = picksInCategory(picker.id, c.id).length;
        const full = usedCount >= quota;
        const eligible = state.field
          .filter(p => isPlayerInCategory(p, c.id, state.tournamentId))
          .filter(p => !picksTaken.has(p.id))
          .sort((a,b) => a.owgr - b.owgr);
        const sel = el('select',{disabled: full || eligible.length===0, id:'sel_'+c.id},
          el('option',{value:''}, full ? 'Slots filled' : (eligible.length===0 ? 'No eligible players' : 'Select a player…')),
          ...eligible.map(p => el('option',{value:p.id}, playerLabel(p)))
        );
        const btn = el('button',{
          class:'btn btn-primary mt-3 w-full',
          disabled: full || eligible.length===0,
          onclick:()=>{
            const val = sel.value;
            if (!val) return toast('Choose a player first.');
            const err = makePick(picker.id, c.id, val);
            if (err) return toast(err);
            persist(); render();
          }
        }, full ? 'Filled' : `Pick ${c.label} (${usedCount+1}/${quota})`);
        grid.appendChild(el('div',{class:'card p-4'},
          el('div',{class:'flex items-center justify-between'},
            el('div',{class:'font-serif text-lg text-masters-800'}, c.label + (quota>1 ? ` × ${quota}` : '')),
            el('div',{class:'text-xs text-gray-500'}, `${eligible.length} eligible`)
          ),
          el('div',{class:'text-xs text-gray-600 mb-2'}, c.help),
          sel, btn
        ));
      });
      wrap.appendChild(grid);
    } else {
      // Alternate picker — any remaining player in the field
      const altUsed = alternatePicks(picker.id).length;
      const altQuota = categoryQuota('alternate');
      const full = altUsed >= altQuota;
      const eligible = state.field
        .filter(p => !picksTaken.has(p.id))
        .sort((a,b) => a.owgr - b.owgr);
      const sel = el('select',{disabled: full || eligible.length===0, id:'sel_alternate'},
        el('option',{value:''}, full ? 'Alternate slots filled' : (eligible.length===0 ? 'No players remaining' : 'Select a player…')),
        ...eligible.map(p => el('option',{value:p.id}, playerLabel(p)))
      );
      const btn = el('button',{
        class:'btn btn-primary mt-3 w-full',
        disabled: full || eligible.length===0,
        onclick:()=>{
          const val = sel.value;
          if (!val) return toast('Choose a player first.');
          const err = makePick(picker.id, 'alternate', val);
          if (err) return toast(err);
          persist(); render();
        }
      }, full ? 'Filled' : `Pick Alternate (${altUsed+1}/${altQuota})`);
      wrap.appendChild(el('div',{class:'card p-4'},
        el('div',{class:'flex items-center justify-between'},
          el('div',{class:'font-serif text-lg text-masters-800'}, `Alternate${altQuota>1?` × ${altQuota}`:''}`),
          el('div',{class:'text-xs text-gray-500'}, `${eligible.length} remaining`)
        ),
        el('div',{class:'text-xs text-gray-600 mb-2'}, 'Backup pick from any category. Not counted unless you swap them into a starter slot on the scoreboard.'),
        sel, btn
      ));
    }
  } else {
    wrap.appendChild(el('div',{class:'card p-5 text-center'},'Draft complete.'));
  }

  // Draft board
  wrap.appendChild(renderDraftBoard());

  return wrap;
}

function renderDraftBoard() {
  const card = el('div',{class:'card p-5 mt-6'});
  card.appendChild(el('div',{class:'flex items-center justify-between mb-3'},
    el('h3',{class:'font-serif text-xl text-masters-800'},'Draft Board'),
    el('div',{class:'text-xs text-gray-500'}, `${state.picks.length}/${state.draftOrder.length} picks made`)
  ));

  // Group picks by user — render starter rows, then alternates section.
  const totalPicks = totalPicksPerUser(state.picksByCategory, state.alternatesPerUser);
  const grid = el('div',{class:'grid grid-cols-1 md:grid-cols-2 gap-4'});
  state.users.forEach(u => {
    const picks = userPicks(u.id);
    const rows = [];
    // Starter rows by category
    CATEGORIES.forEach(c => {
      const quota = categoryQuota(c.id);
      const filled = picksInCategory(u.id, c.id);
      for (let i = 0; i < quota; i++) {
        const pick = filled[i];
        const player = pick ? state.field.find(f => f.id === pick.playerId) : null;
        const label = quota > 1 ? `${c.label} ${i+1}` : c.label;
        const flag = player ? flagOf(player.country) : '';
        rows.push(el('div',{class:'flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0'},
          el('div',{class:'text-sm text-gray-500'}, label),
          el('div',{class:'text-sm font-medium text-gray-800 text-right'},
            player ? `${flag ? flag + ' ' : ''}${player.name}${player.amateur ? ' (Am)' : ''} ` : '—',
            player ? el('span',{class:'text-gray-500 text-xs'}, (player.owgr && player.owgr < 500) ? `#${player.owgr}` : 'NR') : null
          )
        ));
      }
    });
    // Alternates section
    const altQuota = categoryQuota('alternate');
    if (altQuota > 0) {
      const filledAlts = alternatePicks(u.id);
      rows.push(el('div',{class:'text-xs uppercase tracking-wider text-gray-500 font-semibold pt-2 border-t border-gray-200 mt-2'},'Alternates'));
      for (let i = 0; i < altQuota; i++) {
        const pick = filledAlts[i];
        const player = pick ? state.field.find(f => f.id === pick.playerId) : null;
        const flag = player ? flagOf(player.country) : '';
        rows.push(el('div',{class:'flex items-center justify-between py-1.5'},
          el('div',{class:'text-sm text-gray-500'}, `Alt ${i+1}`),
          el('div',{class:'text-sm font-medium text-gray-800 text-right'},
            player ? `${flag ? flag + ' ' : ''}${player.name}${player.amateur ? ' (Am)' : ''} ` : '—',
            player ? el('span',{class:'text-gray-500 text-xs'}, (player.owgr && player.owgr < 500) ? `#${player.owgr}` : 'NR') : null
          )
        ));
      }
    }
    grid.appendChild(el('div',{class:'border border-gray-200 rounded-xl p-3'},
      el('div',{class:'flex items-center justify-between mb-2'},
        el('div',{class:'font-serif text-lg text-masters-800'}, u.name),
        el('div',{class:'text-xs text-gray-500'}, `${picks.length}/${totalPicks}`)
      ),
      ...rows
    ));
  });
  card.appendChild(grid);
  return card;
}

// ---------- SCOREBOARD ----------
function renderScoreboard() {
  const t = tournamentFor(state.tournamentId);
  const wrap = el('section');
  wrap.appendChild(el('div',{class:'flex items-baseline justify-between flex-wrap gap-2 mb-5'},
    el('div',{},
      el('div',{class:'text-xs uppercase tracking-wider text-gray-500 font-semibold'}, 'Live Scoreboard'),
      el('h2',{class:'font-serif text-3xl text-masters-800 font-extrabold'}, t.name),
      el('div',{class:'text-gray-600 text-sm mt-1'},
        state.lastSync ? `Last sync: ${new Date(state.lastSync).toLocaleString()}` : 'No sync yet.')
    ),
    el('div',{class:'flex items-center gap-2'},
      el('button',{class:'btn btn-primary', onclick:syncScores},'↻ Sync Scores'),
      el('button',{class:'btn btn-ghost', onclick:openShareModal}, 'Share'),
      el('button',{class:'btn btn-ghost', onclick:()=>{ state.draftOrder=[]; state.picks=[]; state.currentPickIndex=0; persist(); render(); }}, 'Re-draft')
    )
  ));

  const rows = orderedStandings();
  const lead = rows[0];
  const hasScoring = !!state.lastSync;
  const eventFinal = state.eventState === 'post';
  // A "win" is only declared when the event is final, OR a team already owns the champion
  // (which can only be true post-final per applyEspnData). Otherwise: tournament is live.
  const declareWinner = hasScoring && lead && (eventFinal || lead.ownsWinner);
  // True tie at the top: identical cuts + total and nobody owns the champion. Stable-sort
  // would otherwise arbitrarily crown whoever's first in state.users.
  const tiedAtTop = !declareWinner && hasScoring && rows.length > 1
    && !lead.ownsWinner
    && lead.cuts === rows[1].cuts
    && lead.total === rows[1].total;

  if (declareWinner) {
    const reason =
      lead.ownsWinner ? 'Picked the tournament champion' :
      (rows.length > 1 && lead.cuts > rows[1].cuts) ? `Most cuts made (${lead.cuts})` :
      `Lowest cumulative score (${fmtScore(lead.total)})`;
    wrap.appendChild(el('div',{
      class:'rounded-xl p-4 mb-5 text-center text-white font-serif text-2xl',
      style:'background:linear-gradient(135deg,#0b4d2c 0%,#1a7a46 100%);box-shadow:0 4px 14px rgba(11,77,44,.25)'
    }, `🏆 ${lead.user.name} wins — ${reason}`));
  } else if (tiedAtTop) {
    wrap.appendChild(el('div',{
      class:'rounded-xl p-4 mb-5 text-center text-white font-serif text-xl',
      style:'background:linear-gradient(135deg,#5a4a1e 0%,#8a7330 100%);box-shadow:0 4px 14px rgba(90,74,30,.25)'
    }, `🤝 Tied at ${fmtScore(lead.total)} — ${lead.cuts}/${lead.picks.length} made cut`));
  } else if (hasScoring && lead) {
    const detail =
      (rows.length > 1 && lead.cuts > rows[1].cuts) ? `Most cuts made (${lead.cuts})` :
      `Lowest cumulative score (${fmtScore(lead.total)})`;
    wrap.appendChild(el('div',{
      class:'rounded-xl p-4 mb-5 text-center text-white font-serif text-xl',
      style:'background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 100%);box-shadow:0 4px 14px rgba(30,58,95,.25)'
    }, `📊 ${lead.user.name} currently leading — ${detail}`));
  }

  // Team cards
  const grid = el('div',{class:'grid grid-cols-1 md:grid-cols-2 gap-5'});
  rows.forEach((row,idx) => {
    const isWinner = idx === 0 && declareWinner;
    const isLeading = idx === 0 && hasScoring && !declareWinner && !tiedAtTop;
    const team = el('div',{
      class:'card p-4 ' + (isWinner ? 'winner-glow' : ''),
      style: isWinner ? 'border:2px solid #1a7a46' : (isLeading ? 'border:2px solid #2d5a87' : '')
    });

    // Header — trophy badge when event is final; "Leading" badge while live
    const header = el('div',{class:'flex items-center justify-between mb-3'},
      el('div',{},
        isWinner
          ? el('div',{class:'inline-flex items-center gap-1 text-xs uppercase tracking-wider font-bold rounded-full px-2 py-0.5 mb-1', style:'background:#0b4d2c;color:#fff'}, '🏆 Winner')
          : isLeading
            ? el('div',{class:'inline-flex items-center gap-1 text-xs uppercase tracking-wider font-bold rounded-full px-2 py-0.5 mb-1', style:'background:#2d5a87;color:#fff'}, '📊 Leading')
            : el('div',{class:'text-xs uppercase tracking-wider text-gray-500 font-semibold'}, `Team • Rank #${idx+1}`),
        el('div',{class:'font-serif text-2xl text-masters-800'}, row.user.name)
      ),
      el('div',{class:'text-right'},
        el('div',{class:`text-2xl ${scoreClass(row.total)}`}, fmtScore(row.total)),
        el('div',{class:'text-xs text-gray-500'}, `${row.cuts}/${row.picks.length} made cut`)
      )
    );
    team.appendChild(header);

    // Build alternate-options map used by starter swap dropdowns (alternates not yet swapped out)
    const alternateOptions = row.alternates;

    // Starter rows — one row per quota slot; duplicates like Top 10 ×2 appear twice.
    const table = el('table',{class:'w-full text-sm'});
    table.appendChild(el('thead',{class:'text-gray-500'},
      el('tr',{},
        el('th',{class:'text-left py-1 pr-2'},'Player'),
        el('th',{class:'text-left py-1 pr-2'},'Category'),
        el('th',{class:'text-right py-1 pr-2'},'Score'),
        el('th',{class:'text-center py-1 pr-2'},'Cut'),
        el('th',{class:'text-right py-1'},'Sub')
      )));
    const tbody = el('tbody',{});
    CATEGORIES.forEach(c => {
      const quota = categoryQuota(c.id);
      if (quota === 0) return;
      const slotPicks = row.picks.filter(ps => ps.pick.category === c.id);
      for (let i = 0; i < quota; i++) {
        const ps = slotPicks[i];
        const label = quota > 1 ? `${c.label} Pick #${i+1}` : c.label;
        const s = ps?.score || {};
        const cutCell =
          s.madeCut === true  ? el('span',{class:'tick'},'✓') :
          s.madeCut === false ? el('span',{class:'text-flag font-bold'},'—') :
          el('span',{class:'dash'},'–');

        // Build swap dropdown for this starter (swap with any alternate)
        const swapSel = el('select',{
          style:'padding:4px 8px;font-size:12px',
          onchange:(e)=>{
            const altOverall = Number(e.target.value);
            if (!altOverall || !ps?.pick) { e.target.value=''; return; }
            swapPicks(row.user.id, ps.pick.overall, altOverall);
          }
        },
          el('option',{value:''},'Swap'),
          ...alternateOptions.map(aps => {
            const ap = aps.player;
            const label = ap ? `${flagOf(ap.country) || ''} ${ap.name}` : '—';
            return el('option',{value:String(aps.pick.overall)}, label);
          })
        );

        tbody.appendChild(el('tr',{class:'border-t border-gray-100'},
          el('td',{class:'py-2 pr-2'},
            el('div',{class:'font-medium'},
              (ps?.player ? `${flagOf(ps.player.country) ? flagOf(ps.player.country) + ' ' : ''}${ps.player.name}${ps.player.amateur ? ' (Am)' : ''}` : '—')
            )
          ),
          el('td',{class:'py-2 pr-2 text-gray-500'}, label),
          el('td',{class:`py-2 pr-2 text-right ${scoreClass(s.total)}`}, fmtScore(s.total)),
          el('td',{class:'py-2 pr-2 text-center'}, cutCell),
          el('td',{class:'py-2 text-right'}, ps && alternateOptions.length ? swapSel : el('span',{class:'text-gray-300 text-xs'},'—'))
        ));
      }
    });
    table.appendChild(tbody);
    team.appendChild(table);

    // Alternates section (not counted in team score)
    if (row.alternates.length) {
      team.appendChild(el('div',{class:'mt-3 pt-3 border-t border-gray-200'},
        el('div',{class:'text-xs font-semibold text-gray-700 mb-1'},
          'Alternates ',
          el('span',{class:'text-gray-500 font-normal'},'(not counted in team score)')
        ),
        ...row.alternates.map(aps => {
          const ap = aps.player;
          const s = aps.score || {};
          const cutCell =
            s.madeCut === true  ? el('span',{class:'tick'},'✓') :
            s.madeCut === false ? el('span',{class:'text-flag font-bold'},'—') :
            el('span',{class:'dash'},'–');
          return el('div',{class:'flex items-center justify-between py-1 text-sm'},
            el('div',{class:'text-gray-700'},
              ap ? `${flagOf(ap.country) ? flagOf(ap.country) + ' ' : ''}${ap.name}${ap.amateur ? ' (Am)' : ''}` : '—'
            ),
            el('div',{class:'flex items-center gap-3'},
              el('span',{class:`${scoreClass(s.total)} text-sm`}, fmtScore(s.total)),
              el('span',{class:'w-4 text-center'}, cutCell)
            )
          );
        })
      ));
    }

    grid.appendChild(team);
  });
  wrap.appendChild(grid);

  // Rules reminder
  wrap.appendChild(el('div',{class:'mt-6 card p-4 text-xs text-gray-600'},
    el('div',{class:'font-semibold text-gray-800 mb-1'},'Winner Rules'),
    '1. User who picked the tournament winner wins. 2. Otherwise, most players making the 36-hole cut. 3. Tie-breaker: lowest cumulative team score.'
  ));
  return wrap;
}

// ---------- SHARE ----------
function buildShareUrl() {
  // Only ship what's needed to render the recipient's draft board + scoreboard.
  // State.scores contains every ESPN-synced golfer (60+), and state.field mirrors
  // that — including them all blows the URL past 30KB, which destination apps
  // silently truncate. We only need entries for players that appear in picks
  // (plus the winner, so the "champion" headline renders).
  const picked = new Set((state.picks || []).map(p => p.playerId));
  let winnerId = null;
  Object.entries(state.scores || {}).forEach(([id, s]) => { if (s && s.isWinner) winnerId = id; });
  const keep = new Set(picked);
  if (winnerId) keep.add(winnerId);

  const slimField = (state.field || [])
    .filter(p => keep.has(p.id))
    .map(p => ({ id:p.id, name:p.name, country:p.country, owgr:p.owgr, amateur: !!p.amateur }));
  const slimScores = {};
  Object.entries(state.scores || {}).forEach(([id, s]) => {
    if (!keep.has(id)) return;
    slimScores[id] = { total:s.total, today:s.today, thru:s.thru, madeCut:s.madeCut, pos:s.pos, isWinner: !!s.isWinner };
  });

  const slim = {
    v: 1,
    seedVersion: SEED_VERSION,
    tournamentId: state.tournamentId,
    year: state.year,
    users: state.users,
    picksByCategory: state.picksByCategory,
    alternatesPerUser: state.alternatesPerUser,
    draftOrder: state.draftOrder,
    currentPickIndex: state.currentPickIndex,
    picks: state.picks,
    field: slimField,
    scores: slimScores,
    lastSync: state.lastSync,
    eventState: state.eventState
  };
  const encoded = encodePayload(slim);
  const base = window.location.href.split('#')[0];
  return `${base}#g=${encoded}`;
}

function openShareModal() {
  if (!state.tournamentId) { toast('Pick a tournament first.'); return; }
  const url = buildShareUrl();
  const modal = $('#share-modal');
  const ta = $('#share-modal-url');
  const meta = $('#share-modal-meta');
  ta.value = url;
  const kb = (url.length / 1024).toFixed(1);
  meta.textContent = `${url.length.toLocaleString()} characters (~${kb} KB). Long links sometimes get truncated in SMS or email — paste into Slack, iMessage, or Discord for best results.`;
  modal.classList.add('show');
  // Select after paint so the native select happens after layout
  setTimeout(() => { ta.focus(); ta.select(); }, 30);
  // Also attempt silent clipboard copy as a convenience
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(url).catch(()=>{});
  }
}
function closeShareModal() { $('#share-modal').classList.remove('show'); }
function copyShareUrl() {
  const ta = $('#share-modal-url');
  const url = ta.value;
  const done = () => toast('Link copied.');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(url).then(done).catch(() => { ta.select(); document.execCommand('copy'); done(); });
  } else {
    ta.select(); document.execCommand('copy'); done();
  }
}
$('#share-modal-close').addEventListener('click', closeShareModal);
$('#share-modal-copy').addEventListener('click', copyShareUrl);
$('#share-modal').addEventListener('click', (e) => { if (e.target.id === 'share-modal') closeShareModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeShareModal(); });

// ---------- NAV / WIRING ----------
$('#nav-home').addEventListener('click', () => {
  // Games live in the games store; the active state is just the game in view.
  // Reset to a blank home state so we don't mirror a tournament-less record back.
  const keepYear = state.year;
  state = { ...DEFAULT_STATE(), year: keepYear };
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (_) {}
  render();
});
$('#nav-reset').addEventListener('click', resetAll);

window.addEventListener('hashchange', () => {
  const h = window.location.hash;
  if (h && h.startsWith('#g=')) {
    const p = decodePayload(h.slice(3));
    if (p) { hydrateSharedPayload(p); persist(p); history.replaceState(null,'',window.location.pathname); render(); toast('Loaded shared game.'); }
  }
});

// One-pass repair of every saved game's stale pick IDs. Idempotent and cheap; runs at
// boot so games the user hasn't opened recently are fixed in place rather than only
// when next loaded.
repairAllSavedGames();

render();
</script>
