<script>
/* =====================================================================
   Major Pick'em — single-file SPA
   - Vanilla JS, Tailwind via CDN
   - localStorage persistence
   - Base64-encoded URL sharing (no backend)
   - ESPN public scoreboard API for live scoring
   ===================================================================== */

// ---------- CONSTANTS ----------
const LS_KEY = 'major-pickem:v1';

// ESPN event IDs change each year; these can be updated here without code changes elsewhere.
// When the event is live/recent, ESPN's generic "pga/leaderboard" returns the active event automatically.
const TOURNAMENTS = [
  { id:'masters',  name:'The Masters',             shortName:'Masters',   venue:'Augusta National Golf Club',       location:'Augusta, GA',    month:'April',   color:'#006747', accent:'#b38b00' },

// Category metadata (source of truth for dropdown rendering)
const CATEGORIES = [
  { id:'top10',        label:'Top 10',          help:'Current OWGR rank 1–10.' },
  { id:'international',label:'International',   help:'Non-USA players ranked outside Top 10.' },
  { id:'nomajorwins',  label:'No Major Wins',   help:'Field members who have never won a professional Major.' },
  { id:'firsttimers',  label:'First Timers',    help:'Players making their debut at this Major.' }

// --- Default seed field (editable in-app; used as fallback when API / user list unavailable).
// Each player: { id, name, country, owgr, majorsWon, firstTimerAt: [tournamentIds] }
// This is a plausible 2025-era snapshot — user can edit or load from ESPN roster at draft time.
const SEED_FIELD = [
  { id:'p_scheffler',   name:'Scottie Scheffler',  country:'USA', owgr:1,  majorsWon:['masters'],         firstTimerAt:[] },
  { id:'p_schauffele',  name:'Xander Schauffele',  country:'USA', owgr:2,  majorsWon:['pga','theopen'],   firstTimerAt:[] },
  { id:'p_mcilroy',     name:'Rory McIlroy',       country:'NIR', owgr:3,  majorsWon:['pga','usopen','theopen','masters'], firstTimerAt:[] },
  { id:'p_morikawa',    name:'Collin Morikawa',    country:'USA', owgr:4,  majorsWon:['pga','theopen'],   firstTimerAt:[] },
  { id:'p_homa',        name:'Max Homa',           country:'USA', owgr:5,  majorsWon:[],                  firstTimerAt:[] },
  { id:'p_aberg',       name:'Ludvig Åberg',       country:'SWE', owgr:6,  majorsWon:[],                  firstTimerAt:['usopen'] },
  { id:'p_hovland',     name:'Viktor Hovland',     country:'NOR', owgr:7,  majorsWon:[],                  firstTimerAt:[] },
  { id:'p_lowry',       name:'Shane Lowry',        country:'IRL', owgr:8,  majorsWon:['theopen'],         firstTimerAt:[] },
  { id:'p_matsuyama',   name:'Hideki Matsuyama',   country:'JPN', owgr:9,  majorsWon:['masters'],         firstTimerAt:[] },
  { id:'p_rahm',        name:'Jon Rahm',           country:'ESP', owgr:10, majorsWon:['usopen','masters'],firstTimerAt:[] },
  { id:'p_cantlay',     name:'Patrick Cantlay',    country:'USA', owgr:11, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_fleetwood',   name:'Tommy Fleetwood',    country:'ENG', owgr:12, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_straka',      name:'Sepp Straka',        country:'AUT', owgr:13, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_finau',       name:'Tony Finau',         country:'USA', owgr:14, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_fitzpatrick', name:'Matt Fitzpatrick',   country:'ENG', owgr:15, majorsWon:['usopen'],          firstTimerAt:[] },
  { id:'p_conners',     name:'Corey Conners',      country:'CAN', owgr:16, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_day',         name:'Jason Day',          country:'AUS', owgr:17, majorsWon:['pga'],             firstTimerAt:[] },
  { id:'p_harman',      name:'Brian Harman',       country:'USA', owgr:18, majorsWon:['theopen'],         firstTimerAt:[] },
  { id:'p_mcnealy',     name:'Maverick McNealy',   country:'USA', owgr:19, majorsWon:[],                  firstTimerAt:['masters','pga','usopen','theopen'] },
  { id:'p_detry',       name:'Thomas Detry',       country:'BEL', owgr:20, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_hatton',      name:'Tyrrell Hatton',     country:'ENG', owgr:21, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_young',       name:'Cameron Young',      country:'USA', owgr:22, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_pendrith',    name:'Taylor Pendrith',    country:'CAN', owgr:23, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_bhatia',      name:'Akshay Bhatia',      country:'USA', owgr:24, majorsWon:[],                  firstTimerAt:['masters'] },
  { id:'p_clark',       name:'Wyndham Clark',      country:'USA', owgr:25, majorsWon:['usopen'],          firstTimerAt:[] },
  { id:'p_theegala',    name:'Sahith Theegala',    country:'USA', owgr:26, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_thomas',      name:'Justin Thomas',      country:'USA', owgr:27, majorsWon:['pga'],             firstTimerAt:[] },
  { id:'p_spieth',      name:'Jordan Spieth',      country:'USA', owgr:28, majorsWon:['masters','usopen','theopen'], firstTimerAt:[] },
  { id:'p_sheffield',   name:'Davis Thompson',     country:'USA', owgr:29, majorsWon:[],                  firstTimerAt:['masters','usopen','theopen'] },
  { id:'p_novak',       name:'Andrew Novak',       country:'USA', owgr:30, majorsWon:[],                  firstTimerAt:['masters','pga','usopen','theopen'] },
  { id:'p_kitayama',    name:'Kurt Kitayama',      country:'USA', owgr:31, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_im',          name:'Sungjae Im',         country:'KOR', owgr:32, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_smith',       name:'Cameron Smith',      country:'AUS', owgr:33, majorsWon:['theopen'],         firstTimerAt:[] },
  { id:'p_koepka',      name:'Brooks Koepka',      country:'USA', owgr:34, majorsWon:['pga','usopen'],    firstTimerAt:[] },
  { id:'p_dechambeau',  name:'Bryson DeChambeau',  country:'USA', owgr:35, majorsWon:['usopen'],          firstTimerAt:[] },
  { id:'p_griffin',     name:'Ben Griffin',        country:'USA', owgr:36, majorsWon:[],                  firstTimerAt:['masters','pga','usopen','theopen'] },
  { id:'p_highsmith',   name:'Joe Highsmith',      country:'USA', owgr:37, majorsWon:[],                  firstTimerAt:['masters','pga','usopen','theopen'] },
  { id:'p_rai',         name:'Aaron Rai',          country:'ENG', owgr:38, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_burns',       name:'Sam Burns',          country:'USA', owgr:39, majorsWon:[],                  firstTimerAt:[] },
  { id:'p_bezuidenhout',name:'Christiaan Bezuidenhout', country:'RSA', owgr:40, majorsWon:[],             firstTimerAt:[] }
];

// ---------- STATE ----------
// Per-category pick quota. Total picks per user = sum of these.
const DEFAULT_PICKS_BY_CATEGORY = { top10: 2, international: 1, nomajorwins: 1, firsttimers: 1 };
const picksPerUser = (pbc) => Object.values(pbc).reduce((a,b)=>a+b, 0);

const DEFAULT_STATE = () => ({
  tournamentId: null,         // which Major this game is for
  users: [],                  // [{id, name}]
  picksByCategory: { ...DEFAULT_PICKS_BY_CATEGORY },
  draftOrder: [],             // computed sequence of user ids (snake)
  currentPickIndex: 0,
  picks: [],                  // [{userId, category, playerId, round, overall}]
  field: SEED_FIELD,          // editable roster
  scores: {},                 // playerId -> { total, today, thru, madeCut, rounds:[...], pos }
  lastSync: null
});

let state = loadState();

function loadState() {
  // 1) URL share payload takes precedence on first load
  const hash = window.location.hash;
  if (hash && hash.startsWith('#g=')) {
    try {
      const payload = decodePayload(hash.slice(3));
      if (payload) {
        persist(payload);
        // keep URL clean after ingest
        history.replaceState(null, '', window.location.pathname + window.location.search);
        return payload;
      }
    } catch (e) { console.warn('Bad share payload', e); }
  }
  // 2) localStorage
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Migrate old shape (picksPerUser only) to picksByCategory
      if (!parsed.picksByCategory) parsed.picksByCategory = { ...DEFAULT_PICKS_BY_CATEGORY };
      delete parsed.picksPerUser;
      return { ...DEFAULT_STATE(), ...parsed };
    }
  } catch (e) {}
  return DEFAULT_STATE();
}
function persist(next) {
  state = next ?? state;
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
}
function resetAll() {
  if (!confirm('Reset this game and clear all picks? This cannot be undone.')) return;
  localStorage.removeItem(LS_KEY);
  state = DEFAULT_STATE();
  history.replaceState(null, '', window.location.pathname);
  render();
  toast('Game reset.');
}

// ---------- UTIL ----------
const $ = (sel, root=document) => root.querySelector(sel);
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (v !== null && v !== undefined && v !== false) n.setAttribute(k, v);
  }
  for (const k of kids.flat()) {
    if (k == null || k === false) continue;
    n.appendChild(typeof k === 'string' ? document.createTextNode(k) : k);
  }
  return n;
};
function toast(msg, ms=2200) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), ms);
}
function fmtScore(n) {
  if (n == null || isNaN(n)) return '—';
  if (n === 0) return 'E';
  return n > 0 ? `+${n}` : `${n}`;
}
function scoreClass(n) {
  if (n == null || isNaN(n)) return 'score-even';
  if (n > 0) return 'score-pos';
  if (n < 0) return 'score-neg';
  return 'score-even';
}
function uid(p='id') { return p + '_' + Math.random().toString(36).slice(2,9); }

// Base64 URL-safe encode/decode of compressed JSON
function encodePayload(obj) {
  const json = JSON.stringify(obj);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decodePayload(s) {
  try {
    const b64 = s.replace(/-/g,'+').replace(/_/g,'/') + '==='.slice((s.length+3)%4);
    const json = decodeURIComponent(escape(atob(b64)));
    return JSON.parse(json);
  } catch (e) { return null; }
}

// ---------- DRAFT LOGIC ----------
function buildSnakeOrder(userIds, rounds) {
  // Standard snake: round 1 = A,B,C…  round 2 = C,B,A  etc.
  // For 2 players and 5 rounds this expands to A-B, B-A, A-B, B-A, A-B (each gets 5 picks).
  const order = [];
  for (let r = 0; r < rounds; r++) {
    const roundIds = r % 2 === 0 ? userIds : [...userIds].reverse();
    order.push(...roundIds);
  }
  return order;
}

function isPlayerInCategory(player, categoryId, tournamentId) {
  switch (categoryId) {
    case 'top10':         return player.owgr >= 1 && player.owgr <= 10;
    case 'international': return player.country !== 'USA' && player.owgr > 10;
    case 'nomajorwins':   return (player.majorsWon || []).length === 0;
    case 'firsttimers':   return (player.firstTimerAt || []).includes(tournamentId);
    default: return false;
  }
}

function pickedPlayerIds() { return new Set(state.picks.map(p => p.playerId)); }

function currentPicker() {
  if (!state.draftOrder.length) return null;
  if (state.currentPickIndex >= state.draftOrder.length) return null;
  return state.users.find(u => u.id === state.draftOrder[state.currentPickIndex]);
}

function userPicks(userId) {
  return state.picks.filter(p => p.userId === userId);
}

function picksInCategory(userId, categoryId) {
  return userPicks(userId).filter(p => p.category === categoryId);
}

function categoryQuota(categoryId) {
  return state.picksByCategory?.[categoryId] ?? 1;
}

function categoryQuotaReached(userId, categoryId) {
  return picksInCategory(userId, categoryId).length >= categoryQuota(categoryId);
}

function advancePick() {
  state.currentPickIndex++;
  persist();
}

function makePick(userId, categoryId, playerId) {
  if (pickedPlayerIds().has(playerId)) return 'That player is already taken.';
  if (categoryQuotaReached(userId, categoryId)) return `You've filled your ${CATEGORIES.find(c=>c.id===categoryId)?.label} slots.`;
  const round = Math.floor(state.currentPickIndex / state.users.length) + 1;
  state.picks.push({
    userId, category:categoryId, playerId,
    round, overall: state.currentPickIndex + 1
  });
  advancePick();
  return null;
}

function undoLastPick() {
  if (!state.picks.length) return;
  state.picks.pop();
  state.currentPickIndex = Math.max(0, state.currentPickIndex - 1);
  persist();
  render();
}

function draftComplete() {
  return state.users.length > 0 && state.picks.length >= state.users.length * picksPerUser(state.picksByCategory);
}

// ---------- WINNER DETERMINATION ----------
function winnerPlayerId() {
  // Whoever has the lowest "total" score and madeCut = true and is the recognized champion.
  // We treat: winner = player whose `state.scores[id].pos === '1'` (leader, final).
  // If event incomplete, return null.
  const scoresByPos1 = Object.entries(state.scores).find(([_, s]) => s && (s.pos === '1' || s.pos === 'T1') && s.isWinner);
  if (scoresByPos1) return scoresByPos1[0];
  return null;
}

function computeStandings() {
  return state.users.map(u => {
    const picks = userPicks(u.id);
    const playerScores = picks.map(p => {
      const pl = state.field.find(f => f.id === p.playerId);
      const s = state.scores[p.playerId] || {};
      return { pick: p, player: pl, score: s };
    });
    const total = playerScores.reduce((a,ps) => a + (Number(ps.score.total) || 0), 0);
    const cuts = playerScores.filter(ps => ps.score.madeCut === true).length;
    const ownsWinner = playerScores.some(ps => state.scores[ps.pick.playerId]?.isWinner);
    return { user:u, picks:playerScores, total, cuts, ownsWinner };
  });
}

function orderedStandings() {
  const rows = computeStandings();
  // Rule 1: owner of the winning player
  rows.sort((a,b) => {
    if (a.ownsWinner !== b.ownsWinner) return a.ownsWinner ? -1 : 1;
    // Rule 2: most cuts made
    if (b.cuts !== a.cuts) return b.cuts - a.cuts;
    // Rule 3: lowest cumulative score among tied cut counts
    return a.total - b.total;
  });
  return rows;
}

// ---------- ESPN SYNC ----------
const ESPN_ENDPOINTS = [
  'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard',
  'https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard'
];
async function fetchEspn() {
  let lastErr;
  for (const url of ESPN_ENDPOINTS) {
    try {
      const res = await fetch(url, { cache:'no-store' });
      if (!res.ok) { lastErr = new Error(`HTTP ${res.status} from ${url}`); continue; }
      const data = await res.json();
      if (data?.events?.[0]?.competitions?.[0]?.competitors?.length) return data;
      lastErr = new Error('Empty competitors');
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('ESPN unreachable');
}

async function syncScores() {
  if (!state.tournamentId) return;
  toast('Fetching ESPN leaderboard…');
  try {
    const data = await fetchEspn();
    applyEspnData(data);
    state.lastSync = new Date().toISOString();
    persist();
    render();
    const evName = data?.events?.[0]?.name || 'event';
    toast(`Scores synced (${evName}).`);
  } catch (e) {
    console.warn('ESPN sync failed:', e);
    toast('Could not reach ESPN. Check console for details.');
  }
}

function normalizeName(n) {
  return (n||'').toLowerCase()
    .replace(/[\u00C0-\u024F]/g, c => c.normalize('NFD').replace(/[\u0300-\u036f]/g,''))
    .replace(/[^a-z ]/g,'').replace(/\s+/g,' ').trim();
}

function applyEspnData(data) {
  // ESPN returns events[0].competitions[0].competitors[*]. Response shape:
  //   athlete.displayName, athlete.flag.alt (country name)
  //   score: { value, displayValue } OR number
  //   status.position.displayName ('T12', '1'), status.type.name ('STATUS_CUT', 'STATUS_FINISH'...)
  //   status.period (1..4 by round), status.thru/displayThru
  const event = data?.events?.[0];
  if (!event) return;
  const comp = event.competitions?.[0];
  const competitors = comp?.competitors || [];
  const evState = (comp?.status?.type?.state || event?.status?.type?.state || '').toLowerCase();
  const isFinal = evState === 'post' || /final|complete/i.test(comp?.status?.type?.name || '');

  const byName = new Map();
  state.field.forEach(p => byName.set(normalizeName(p.name), p));

  // winner: position '1' (not tied) when event is post/final
  let winnerId = null;
  if (isFinal) {
    const w = competitors.find(c => {
      const pos = c.status?.position;
      return pos && (pos.displayName === '1' || pos.id === '1') && !pos.isTie;
    }) || competitors.find(c => c.winner === true);
    if (w) {
      const wp = byName.get(normalizeName(w.athlete?.displayName));
      if (wp) winnerId = wp.id;
    }
  }

  competitors.forEach(c => {
    const ath = c.athlete || {};
    const key = normalizeName(ath.displayName || ath.fullName);
    const p = byName.get(key);
    if (!p) return;

    const posTxt = (c.status?.position?.displayName ?? c.status?.position?.id ?? '').toString();
    const scoreRaw = typeof c.score === 'object' && c.score !== null ? c.score.displayValue : c.score;
    const toPar = parseScore(scoreRaw);

    const stateName = (c.status?.type?.name || '').toUpperCase();
    const madeCut =
      /CUT|WD|DQ|WITHDRAW/.test(stateName) ? false :
      (c.status?.period || 0) >= 3 ? true :
      null;

    const lastLs = (c.linescores||[])[ (c.linescores||[]).length - 1 ];
    const todayRaw = lastLs && (typeof lastLs === 'object' ? (lastLs.displayValue ?? lastLs.value) : lastLs);

    state.scores[p.id] = {
      total: toPar,
      today: parseScore(todayRaw),
      thru:  c.status?.displayThru ?? c.status?.thru ?? c.status?.displayValue ?? '',
      rounds: (c.linescores||[]).map(l => (typeof l === 'object' ? l.value : l)),
      pos: posTxt,
      madeCut,
      isWinner: winnerId === p.id
    };
  });
}

function parseScore(v) {
  if (v == null) return null;
  const s = String(v).trim();
  if (!s || s === '-') return null;
  if (/^E$/i.test(s)) return 0;
  const n = parseInt(s.replace(/\+/,''), 10);
  return isNaN(n) ? null : n;
}

// ---------- ROUTING ----------
const routes = ['home','setup','draft','scoreboard'];
function currentRoute() {
  if (!state.tournamentId)       return 'home';
  if (!state.draftOrder.length)  return 'setup';
  if (!draftComplete())          return 'draft';
  return 'scoreboard';
}

// ---------- RENDER ----------
function render() {
  const root = $('#app'); root.innerHTML = '';

    r === 'home'       ? renderHome() :

    r === 'draft'      ? renderDraft() :

  view.classList.add('fade-in');
  root.appendChild(view);
}

// ESPN `athlete.flag.alt` is a country name ("United States", "England", "Northern Ireland").
// Map to 3-letter codes so the International / USA filter works.
const COUNTRY_CODES = {
  'united states':'USA','usa':'USA','u.s.':'USA','us':'USA',
  'england':'ENG','scotland':'SCO','wales':'WAL','northern ireland':'NIR','ireland':'IRL',
  'south africa':'RSA','australia':'AUS','new zealand':'NZL','japan':'JPN','south korea':'KOR',
  'republic of korea':'KOR','korea':'KOR','canada':'CAN','mexico':'MEX','colombia':'COL',
  'argentina':'ARG','chile':'CHI','venezuela':'VEN','germany':'GER','spain':'ESP',
  'france':'FRA','italy':'ITA','sweden':'SWE','norway':'NOR','denmark':'DEN','finland':'FIN',
  'austria':'AUT','belgium':'BEL','netherlands':'NED','poland':'POL','czech republic':'CZE',
  'taiwan':'TPE','chinese taipei':'TPE','china':'CHN','thailand':'THA','india':'IND',
  'philippines':'PHI','malaysia':'MAS','singapore':'SGP','zimbabwe':'ZIM','fiji':'FIJ',
  'puerto rico':'PUR'
};
function countryCode(raw) {
  if (!raw) return 'USA';
  const k = String(raw).toLowerCase().trim();
  if (COUNTRY_CODES[k]) return COUNTRY_CODES[k];
  if (/^[a-z]{3}$/.test(k)) return k.toUpperCase();
  return String(raw).toUpperCase().slice(0,3);
}

async function pullFieldFromEspn() {
  toast('Loading field from ESPN…');
  try {
    const data = await fetchEspn();
    const comps = data?.events?.[0]?.competitions?.[0]?.competitors || [];
    if (!comps.length) throw new Error('No competitors returned');
    const existingIds = new Set(state.field.map(p=>p.id));
    let added = 0;
    comps.forEach((c,i) => {
      const ath = c.athlete || {};
      const name = ath.displayName || ath.fullName;
      if (!name) return;
      const id = 'espn_' + (ath.id || normalizeName(name).replace(/\s+/g,'_'));
      if (existingIds.has(id)) return;
      state.field.push({
        id,
        name,
        country: countryCode(ath.flag?.alt || ath.birthPlace?.country),
        owgr: (i+1),
        majorsWon: [],
        firstTimerAt: []
      });
      added++;
    });
    persist(); render();
    const evName = data?.events?.[0]?.name || 'event';
    toast(`Field loaded from ${evName} (+${added} new). Verify OWGR/majors before drafting.`);
  } catch (e) {
    console.warn('Pull field failed:', e);
    toast('ESPN field fetch failed. See console.');
  }
}

function renderDraft() {

  const picksTaken = pickedPlayerIds();

  const wrap = el('section');
  wrap.appendChild(el('div',{class:'flex items-baseline justify-between flex-wrap gap-2 mb-5'},

    ),
    el('div',{class:'flex items-center gap-2'},
      el('button',{class:'btn btn-ghost', onclick:undoLastPick, disabled: state.picks.length===0}, 'Undo Last'),
      el('button',{class:'btn btn-ghost', onclick:()=>{ state.users=[]; state.draftOrder=[]; state.picks=[]; state.currentPickIndex=0; persist(); render(); }}, 'Back to Setup')
    )
  ));

  // On the clock card
  const onClock = el('div',{class:'card p-5 mb-5 border-masters-600 border-2'},
    el('div',{class:'flex items-center justify-between flex-wrap gap-3'},
      el('div',{},
        el('div',{class:'text-xs uppercase tracking-wider text-masters-700 font-bold'}, 'On the Clock'),
        el('div',{class:'font-serif text-3xl text-masters-800 mt-1'}, picker ? picker.name : '—'),
        el('div',{class:'text-sm text-gray-600 mt-1'}, `Round ${round} • Pick #${state.currentPickIndex+1}`)
      ),
      el('div',{class:'text-right'},
        el('div',{class:'text-xs uppercase tracking-wider text-gray-500 font-semibold'}, 'Slots for '+ (picker?.name||'')),
        el('div',{class:'mt-1 flex flex-wrap gap-1 justify-end'},
          ...(picker ? CATEGORIES.map(c => {
            const quota = categoryQuota(c.id);
            if (quota === 0) return null;
            const used = picksInCategory(picker.id, c.id).length;
            const full = used >= quota;
            return el('span',{class:'pill ' + (full ? 'pill-red' : 'pill-green')}, `${c.label} ${used}/${quota}`);
          }).filter(Boolean) : [])
        )
      )
    )
  );
  wrap.appendChild(onClock);

  // Category dropdowns
  if (picker) {
    const grid = el('div',{class:'grid grid-cols-1 sm:grid-cols-2 gap-4'});
    CATEGORIES.forEach(c => {
      const quota = categoryQuota(c.id);
      if (quota === 0) return;
      const usedCount = picksInCategory(picker.id, c.id).length;
      const full = usedCount >= quota;
      const eligible = state.field
        .filter(p => isPlayerInCategory(p, c.id, state.tournamentId))
        .filter(p => !picksTaken.has(p.id))
        .sort((a,b) => a.owgr - b.owgr);

      const sel = el('select',{disabled: full || eligible.length===0, id:'sel_'+c.id},
        el('option',{value:''}, full ? 'Slots filled' : (eligible.length===0 ? 'No eligible players' : 'Select a player…')),
        ...eligible.map(p => el('option',{value:p.id}, `#${p.owgr} ${p.name} (${p.country})`))
      );

      const btn = el('button',{
        class:'btn btn-primary mt-3 w-full',
        disabled: full || eligible.length===0,
        onclick:()=>{
          const val = sel.value;
          if (!val) return toast('Choose a player first.');
          const err = makePick(picker.id, c.id, val);
          if (err) return toast(err);
          persist(); render();
        }
      }, full ? 'Filled' : `Pick ${c.label} (${usedCount+1}/${quota})`);

      grid.appendChild(el('div',{class:'card p-4'},
        el('div',{class:'flex items-center justify-between'},
          el('div',{class:'font-serif text-lg text-masters-800'}, c.label + (quota>1 ? ` × ${quota}` : '')),
          el('div',{class:'text-xs text-gray-500'}, `${eligible.length} eligible`)
        ),
        el('div',{class:'text-xs text-gray-600 mb-2'}, c.help),
        sel, btn
      ));
    });
    wrap.appendChild(grid);
  } else {
    wrap.appendChild(el('div',{class:'card p-5 text-center'},'Draft complete.'));
  }

  // Draft board
  wrap.appendChild(renderDraftBoard());

  return wrap;
}

function renderDraftBoard() {
  const card = el('div',{class:'card p-5 mt-6'});
  card.appendChild(el('div',{class:'flex items-center justify-between mb-3'},
    el('h3',{class:'font-serif text-xl text-masters-800'},'Draft Board'),
    el('div',{class:'text-xs text-gray-500'}, `${state.picks.length}/${state.draftOrder.length} picks made`)
  ));

  // Group picks by user — render one row per quota slot so "Top 10 × 2" shows twice.
  const totalPicks = picksPerUser(state.picksByCategory);
  const grid = el('div',{class:'grid grid-cols-1 md:grid-cols-2 gap-4'});
  state.users.forEach(u => {
    const picks = userPicks(u.id);
    const rows = [];
    CATEGORIES.forEach(c => {
      const quota = categoryQuota(c.id);
      const filled = picksInCategory(u.id, c.id);
      for (let i = 0; i < quota; i++) {
        const pick = filled[i];
        const player = pick ? state.field.find(f => f.id === pick.playerId) : null;
        const label = quota > 1 ? `${c.label} ${i+1}` : c.label;
        rows.push(el('div',{class:'flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0'},
          el('div',{class:'text-sm text-gray-500'}, label),
          el('div',{class:'text-sm font-medium text-gray-800 text-right'},
            player ? `${player.name} ` : '—',
            player ? el('span',{class:'text-gray-500 text-xs'}, `#${player.owgr}`) : null
          )
        ));
      }
    });
    grid.appendChild(el('div',{class:'border border-gray-200 rounded-xl p-3'},
      el('div',{class:'flex items-center justify-between mb-2'},
        el('div',{class:'font-serif text-lg text-masters-800'}, u.name),
        el('div',{class:'text-xs text-gray-500'}, `${picks.length}/${totalPicks}`)
      ),
      ...rows
    ));
  });
  card.appendChild(grid);
  return card;
}

    )
  );
  wrap.appendChild(summary);

  // Team cards
  const grid = el('div',{class:'grid grid-cols-1 md:grid-cols-2 gap-5'});
  rows.forEach((row,idx) => {
    const team = el('div',{class:'card p-4 ' + (idx===0 ? 'winner-glow' : '')});
    team.appendChild(el('div',{class:'flex items-center justify-between mb-3'},
      el('div',{},
        el('div',{class:'text-xs uppercase tracking-wider text-gray-500 font-semibold'}, `Team • Rank #${idx+1}`),
        el('div',{class:'font-serif text-2xl text-masters-800'}, row.user.name)
      ),
      el('div',{class:'text-right'},
        el('div',{class:'text-xs text-gray-500'}, 'Total'),
        el('div',{class:`text-2xl ${scoreClass(row.total)}`}, fmtScore(row.total)),
        el('div',{class:'text-xs text-gray-500'}, `${row.cuts} made cut`)
      )
    ));
    // Player rows — one row per quota slot; duplicates like Top 10 ×2 appear twice.
    const table = el('table',{class:'w-full text-sm'});
    table.appendChild(el('thead',{class:'text-gray-500'},
      el('tr',{},
        el('th',{class:'text-left py-1 pr-2'},'Category'),
        el('th',{class:'text-left py-1 pr-2'},'Player'),
        el('th',{class:'text-left py-1 pr-2'},'Pos'),
        el('th',{class:'text-right py-1 pr-2'},'Score'),
        el('th',{class:'text-center py-1'},'Cut')
      )));
    const tbody = el('tbody',{});
    CATEGORIES.forEach(c => {
      const quota = categoryQuota(c.id);
      if (quota === 0) return;
      const slotPicks = row.picks.filter(ps => ps.pick.category === c.id);
      for (let i = 0; i < quota; i++) {
        const ps = slotPicks[i];
        const label = quota > 1 ? `${c.label} ${i+1}` : c.label;
        const s = ps?.score || {};
        const cutCell =
          s.madeCut === true  ? el('span',{class:'tick'},'✓') :
          s.madeCut === false ? el('span',{class:'text-flag font-bold'},'—') :
          el('span',{class:'dash'},'–');
        tbody.appendChild(el('tr',{class:'border-t border-gray-100'},
          el('td',{class:'py-2 pr-2 text-gray-500'}, label),
          el('td',{class:'py-2 pr-2'},
            el('div',{class:'font-medium'}, ps?.player?.name || '—'),
            el('div',{class:'text-xs text-gray-500'}, ps?.player ? `#${ps.player.owgr} • ${ps.player.country}` : '')
          ),
          el('td',{class:'py-2 pr-2 text-gray-600'}, s.pos || '—'),
          el('td',{class:`py-2 pr-2 text-right ${scoreClass(s.total)}`}, fmtScore(s.total)),
          el('td',{class:'py-2 text-center'}, cutCell)
        ));
      }
    });
    table.appendChild(tbody);
    team.appendChild(table);
    grid.appendChild(team);
  });
  wrap.appendChild(grid);

  // Rules reminder
  wrap.appendChild(el('div',{class:'mt-6 card p-4 text-xs text-gray-600'},
    el('div',{class:'font-semibold text-gray-800 mb-1'},'Winner Rules'),
    '1. User who picked the tournament winner wins. 2. Otherwise, most players making the 36-hole cut. 3. Tie-breaker: lowest cumulative team score.'
  ));
  return wrap;
}

// ---------- SHARE ----------
function buildShareUrl() {
  const payload = { ...state };
  // drop large fields that can be rebuilt or are transient
  const slim = {
    tournamentId: payload.tournamentId,
    users: payload.users,
    picksPerUser: payload.picksPerUser,
    draftOrder: payload.draftOrder,
    currentPickIndex: payload.currentPickIndex,
    picks: payload.picks,
    field: payload.field, // include so dropdowns match on join
    scores: payload.scores,
    lastSync: payload.lastSync
  };
  const encoded = encodePayload(slim);
  const base = window.location.href.split('#')[0];
  return `${base}#g=${encoded}`;
}

// ---------- NAV / WIRING ----------
$('#nav-home').addEventListener('click', () => {
  if (state.picks.length && !confirm('Leave this game and return to home? Your current picks stay saved.')) return;
  state.tournamentId = null; persist(); render();
});
$('#nav-share').addEventListener('click', () => {
  if (!state.tournamentId) return toast('Pick a tournament first.');
  const url = buildShareUrl();
  navigator.clipboard.writeText(url).then(() => toast('Share URL copied to clipboard.'));
});
$('#nav-reset').addEventListener('click', resetAll);

window.addEventListener('hashchange', () => {
  const h = window.location.hash;
  if (h && h.startsWith('#g=')) {
    const p = decodePayload(h.slice(3));
    if (p) { persist(p); history.replaceState(null,'',window.location.pathname); render(); toast('Loaded shared game.'); }
  }
});

render();
</script>
